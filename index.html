<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WMS Mockup V1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        :root {
            --accent-rgb: 239 68 68;
            --surface-rgb: 5 5 5;
            --text-rgb: 248 250 252;
            --text-muted-rgb: 203 213 225;
            --border-rgb: 255 255 255;
            --card-rgb: 255 255 255;
            --chip-rgb: 255 255 255;
            --input-rgb: 255 255 255;
            --nav-rgb: 255 255 255;
            --accent-contrast-rgb: 255 255 255;
            --accent-soft-opacity: .16;
            --accent-border-opacity: .5;
            --border-opacity: .15;
            --card-opacity: .1;
            --chip-opacity: .1;
            --input-opacity: .05;
            --nav-opacity: .06;
            --glass-shadow: 0 8px 32px 0 rgba(0,0,0,.35);
        }

        body[data-theme='light'] {
            --accent-rgb: 220 38 38;
            --surface-rgb: 243 246 251;
            --text-rgb: 15 23 42;
            --text-muted-rgb: 71 85 105;
            --border-rgb: 148 163 184;
            --card-rgb: 255 255 255;
            --chip-rgb: 241 245 249;
            --input-rgb: 255 255 255;
            --nav-rgb: 255 255 255;
            --accent-contrast-rgb: 255 255 255;
            --border-opacity: .35;
            --card-opacity: .82;
            --chip-opacity: 1;
            --input-opacity: 1;
            --nav-opacity: .78;
            --glass-shadow: 0 8px 32px 0 rgba(148,163,184,.2);
        }

        .bg-surface { background-color: rgb(var(--surface-rgb)); }
        .text-main { color: rgb(var(--text-rgb)); }
        .text-muted { color: rgb(var(--text-muted-rgb) / .88); }
        .text-muted-soft { color: rgb(var(--text-muted-rgb) / .7); }
        .border-default { border-color: rgb(var(--border-rgb) / var(--border-opacity)); }
        .bg-card { background-color: rgb(var(--card-rgb) / var(--card-opacity)); }
        .bg-chip { background-color: rgb(var(--chip-rgb) / var(--chip-opacity)); }
        .bg-input { background-color: rgb(var(--input-rgb) / var(--input-opacity)); }
        .bg-nav { background-color: rgb(var(--nav-rgb) / var(--nav-opacity)); }
        .shadow-glass { box-shadow: var(--glass-shadow); }

        .text-accent { color: rgb(var(--accent-rgb)); }
        .bg-accent { background-color: rgb(var(--accent-rgb)); }
        .bg-accent-soft { background-color: rgb(var(--accent-rgb) / var(--accent-soft-opacity)); }
        .bg-accent-subtle { background-color: rgb(var(--accent-rgb) / .12); }
        .border-accent { border-color: rgb(var(--accent-rgb) / var(--accent-border-opacity)); }
        .ring-accent { --tw-ring-color: rgb(var(--accent-rgb) / .45); }
        .selection-accent::selection { background-color: rgb(var(--accent-rgb) / .28); }
        .focus-accent:focus { border-color: rgb(var(--accent-rgb)); }

        .btn-accent { background-color: rgb(var(--accent-rgb)); color: rgb(var(--accent-contrast-rgb)); border-color: rgb(var(--accent-rgb) / .78); }
        .btn-accent:hover { background-color: rgb(var(--accent-rgb) / .9); }
        .btn-accent-soft { background-color: rgb(var(--accent-rgb) / .86); color: rgb(var(--accent-contrast-rgb)); border-color: rgb(var(--accent-rgb) / .75); }
        .btn-accent-soft:hover { background-color: rgb(var(--accent-rgb)); }

        .icon-badge-accent { background-color: rgb(var(--accent-rgb) / .18); color: rgb(var(--accent-rgb)); }
        .nav-active { color: rgb(var(--accent-rgb)); border-color: rgb(var(--accent-rgb) / .5); background-color: rgb(var(--accent-rgb) / .15); }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        #reader video { object-fit: cover; width: 100% !important; height: 100% !important; border-radius: 1.5rem; }
    </style>
</head>
<body data-theme="dark" class="bg-surface text-main h-screen w-screen overflow-hidden font-sans selection-accent">
    <div class="fixed inset-0 pointer-events-none overflow-hidden">
        <div class="absolute -top-[20%] -left-[10%] w-[70%] h-[50%] bg-accent-soft rounded-full blur-[120px] animate-pulse mix-blend-screen"></div>
        <div class="absolute top-[40%] -right-[10%] w-[60%] h-[60%] bg-accent-subtle rounded-full blur-[120px] mix-blend-screen"></div>
    </div>
    <div id="app" class="relative z-10 h-full w-full max-w-md mx-auto"></div>

    <script>
        const STORAGE_KEY = 'wms_mockup_v1_state';

        const DEFAULT_DB = {
            assets: [
                { serial: 'H2X386Y00010', device: 'DV-240015', description: 'Linde E20 Heftruck', location: 'C-LINKS', status: 'Beschikbaar', updatedAt: '2026-04-23T08:05:00Z' },
                { serial: 'H2X386Y00011', device: 'DV-240016', description: 'Linde Xi10', location: 'W16', status: 'Op werkvloer', updatedAt: '2026-04-23T07:55:00Z' },
                { serial: 'H2X386Y00012', device: 'DV-240017', description: 'Linde R14 Reachtruck', location: 'EXP-01', status: 'Beschikbaar', updatedAt: '2026-04-23T07:40:00Z' },
                { serial: 'H2X386Y00013', device: 'DV-240018', description: 'Tennant T16', location: 'INK-01', status: 'Ontvangst', updatedAt: '2026-04-23T07:25:00Z' },
                { serial: 'H2X386Y00014', device: 'DV-240019', description: 'Linde E35', location: 'C-RECHTS', status: 'Beschikbaar', updatedAt: '2026-04-23T07:10:00Z' }
            ],
            tasks: [
                { id: 'REQ-1001', serial: 'H2X386Y00010', fromLocation: 'C-LINKS', toLocation: 'W16', requester: 'PLN', assignee: 'MON', notes: 'Klaarzetten voor werkplaats 16', status: 'Open', createdAt: '2026-04-23T07:30:00Z' },
                { id: 'REQ-1002', serial: 'H2X386Y00012', fromLocation: 'EXP-01', toLocation: 'DOCK-02', requester: 'EXP', assignee: 'EXP', notes: 'Transport gereedmaken', status: 'Open', createdAt: '2026-04-23T07:50:00Z' }
            ],
            receipts: [
                { id: 'RCV-9001', receiptNumber: 'PAK-77821', externalNumber: 'EXT-9901', serial: 'H2X386Y00013', device: 'DV-240018', location: 'INK-01', operator: 'SYS', createdAt: '2026-04-23T07:25:00Z' }
            ],
            history: [
                { id: 'HIS-1', type: 'move', serial: 'H2X386Y00011', device: 'DV-240016', fromLocation: 'C-LINKS', toLocation: 'W16', operator: 'EXP', note: 'Werkplaats aanvraag', createdAt: '2026-04-23T07:55:00Z' },
                { id: 'HIS-2', type: 'receipt', serial: 'H2X386Y00013', device: 'DV-240018', fromLocation: 'LEVERANCIER', toLocation: 'INK-01', operator: 'SYS', note: 'Ontvangen op pakbon PAK-77821', createdAt: '2026-04-23T07:25:00Z' }
            ]
        };

        const DEFAULT_LOCATION_ZONES = [
            'C-LINKS',
            'C-RECHTS',
            'W16',
            'EXP-01',
            'INK-01',
            'DOCK-01',
            'DOCK-02',
            'DOCK-03',
            'DOCK-04'
        ];

        const LOCATION_STATUS_CONFIG = {
            defaultStatus: 'Beschikbaar',
            rules: [
                { prefix: 'W', status: 'Op werkvloer' },
                { prefix: 'EXP', status: 'Expeditie' },
                { prefix: 'INK', status: 'Ontvangst' },
                { prefix: 'DOCK', status: 'Dock' }
            ]
        };

        const MOCK_USERS = [
            { initials: 'PLN', name: 'Iris Planner', role: 'planner' },
            { initials: 'EXP', name: 'Noah Expeditie', role: 'expeditie' },
            { initials: 'MON', name: 'Sara Monteur', role: 'monteur' },
            { initials: 'MGR', name: 'Lars Manager', role: 'manager' }
        ];

        const ROLE_LABELS = {
            planner: 'Planner',
            expeditie: 'Expeditie',
            monteur: 'Monteur',
            manager: 'Manager'
        };

        const ROLE_STYLES = {
            planner: 'bg-blue-500/15 border-blue-400/30 text-blue-200',
            expeditie: 'bg-emerald-500/15 border-emerald-400/30 text-emerald-200',
            monteur: 'bg-amber-500/15 border-amber-400/30 text-amber-100',
            manager: 'bg-purple-500/15 border-purple-400/30 text-purple-100'
        };

        let state = {
            view: 'login',
            user: null,
            loginInitials: '',
            loginRole: 'expeditie',
            darkMode: true,
            flash: null,
            showScanner: false,
            scannerTarget: null,
            html5QrCode: null,
            scannerManualValue: '',
            activeTaskId: null,
            receiptPrefill: null,
            moveAssetSearch: '',
            moveVisibleAssets: 6,
            taskStatusFilter: 'all',
            taskDateSort: 'newest',
            showNavOverflow: false,
            showExportModal: false,
            exportCopied: false,
            forms: {
                move: { serial: '', toLocation: '', note: '' },
                task: { serial: '', fromLocation: '', toLocation: '', notes: '', assignee: 'MON' },
                receipt: { receiptNumber: '', externalNumber: '', serial: '', device: '', location: 'INK-01' }
            },
            validation: {
                move: {},
                task: {},
                receipt: {}
            },
            db: loadDb()
        };

        function loadDb() {
            try {
                const stored = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
                if (!stored) return structuredClone(DEFAULT_DB);
                return {
                    assets: Array.isArray(stored.assets) ? stored.assets : structuredClone(DEFAULT_DB.assets),
                    tasks: Array.isArray(stored.tasks) ? stored.tasks : structuredClone(DEFAULT_DB.tasks),
                    receipts: Array.isArray(stored.receipts) ? stored.receipts : structuredClone(DEFAULT_DB.receipts),
                    history: Array.isArray(stored.history) ? stored.history : structuredClone(DEFAULT_DB.history)
                };
            } catch (error) {
                return structuredClone(DEFAULT_DB);
            }
        }

        function persistDb() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state.db));
        }

        function normalizeCode(value) {
            return String(value || '').trim().replace(/\s+/g, '').toUpperCase();
        }

        function getStatusForLocation(locationCode) {
            const normalizedLocation = normalizeCode(locationCode);
            const matchedRule = LOCATION_STATUS_CONFIG.rules.find((rule) => normalizedLocation.startsWith(normalizeCode(rule.prefix)));
            return matchedRule?.status || LOCATION_STATUS_CONFIG.defaultStatus;
        }

        function setState(updates) {
            state = { ...state, ...updates };
            persistDb();
            render();
        }

        function setFlash(message, variant = 'success') {
            state.flash = { message, variant };
            render();
            setTimeout(() => {
                if (state.flash?.message === message) {
                    state.flash = null;
                    render();
                }
            }, 2200);
        }

        function getTheme() {
            return {
                bg: 'bg-surface',
                textMain: 'text-main',
                textSec: 'text-muted',
                glass: 'bg-card border-default shadow-glass',
                chip: 'bg-chip border-default',
                input: 'border-default bg-input text-main placeholder:text-muted-soft',
                nav: 'bg-nav border-default'
            };
        }

        function syncBodyTheme() {
            const body = document.body;
            body.dataset.theme = state.darkMode ? 'dark' : 'light';
            body.className = 'bg-surface text-main h-screen w-screen overflow-hidden font-sans selection-accent';
        }

        function GlassCard(content, extraClasses = '') {
            const t = getTheme();
            return `
                <div class="relative overflow-hidden rounded-2xl border backdrop-blur-xl ${t.glass} ${extraClasses}">
                    <div class="absolute inset-0 pointer-events-none bg-gradient-to-br ${state.darkMode ? 'from-white/10' : 'from-white/60'} to-transparent"></div>
                    <div class="relative z-10 p-4">${content}</div>
                </div>
            `;
        }

        function Button(label, onClick, variant = 'primary', icon = '') {
            const variants = {
                primary: 'btn-accent',
                secondary: 'bg-chip text-main border-default hover:bg-card',
                success: 'btn-accent-soft'
            };
            return `
                <button onclick="${onClick}" class="w-full px-4 py-3 rounded-xl border font-semibold flex items-center justify-center gap-2 transition-all active:scale-95 ${variants[variant]}">
                    ${icon ? `<i data-lucide="${icon}" width="18"></i>` : ''}
                    <span>${label}</span>
                </button>
            `;
        }

        function nowIso() {
            return new Date().toISOString();
        }

        function buildExportPayload() {
            return {
                exportedAt: nowIso(),
                source: 'state.db',
                assets: state.db.assets,
                tasks: state.db.tasks,
                receipts: state.db.receipts,
                history: state.db.history
            };
        }

        function getExportJson() {
            return JSON.stringify(buildExportPayload(), null, 2);
        }

        function downloadExportJson() {
            const payload = getExportJson();
            const blob = new Blob([payload], { type: 'application/json;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const anchor = document.createElement('a');
            const timestamp = new Date().toISOString().replace(/[:.]/g, '-');
            anchor.href = url;
            anchor.download = `wms-state-export-${timestamp}.json`;
            document.body.appendChild(anchor);
            anchor.click();
            anchor.remove();
            URL.revokeObjectURL(url);
        }

        function makeId(prefix) {
            return `${prefix}-${Math.floor(Math.random() * 9000) + 1000}`;
        }

        function formatDateTime(value) {
            return new Date(value).toLocaleString('nl-NL', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
        }

        function getAssetByCode(code) {
            const normalized = normalizeCode(code);
            return state.db.assets.find(asset => normalizeCode(asset.serial) === normalized || normalizeCode(asset.device) === normalized) || null;
        }

        function getAssetBySerial(serial) {
            return state.db.assets.find(asset => normalizeCode(asset.serial) === normalizeCode(serial)) || null;
        }

        function getOpenTasks() {
            return state.db.tasks.filter(task => task.status === 'Open');
        }

        function getMockUserByInitials(initials) {
            const normalized = normalizeCode(initials);
            return MOCK_USERS.find(user => user.initials === normalized) || null;
        }

        function getRoleLabel(role) {
            return ROLE_LABELS[role] || 'Medewerker';
        }

        function getRoleStyle(role) {
            return ROLE_STYLES[role] || 'bg-white/10 border-white/20 text-white';
        }

        function getAllowedViews(role) {
            const byRole = {
                planner: ['dashboard', 'move', 'tasks', 'receive', 'history', 'datamodel'],
                expeditie: ['dashboard', 'move', 'receive', 'history', 'datamodel'],
                monteur: ['dashboard', 'move', 'tasks', 'history', 'datamodel'],
                manager: ['dashboard', 'history', 'datamodel']
            };
            return byRole[role] || ['dashboard'];
        }

        function canAccessView(view) {
            if (!state.user) return view === 'login';
            return getAllowedViews(state.user.role).includes(view);
        }

        function getVisibleTasks() {
            const role = state.user?.role;
            if (role === 'monteur') {
                return state.db.tasks.filter(task => normalizeCode(task.assignee) === normalizeCode(state.user.initials));
            }
            return state.db.tasks;
        }

        function getValidLocations() {
            const locations = new Set(DEFAULT_LOCATION_ZONES.map(normalizeCode));
            state.db.assets.forEach(asset => locations.add(normalizeCode(asset.location)));
            state.db.tasks.forEach(task => {
                locations.add(normalizeCode(task.fromLocation));
                locations.add(normalizeCode(task.toLocation));
            });
            state.db.receipts.forEach(receipt => locations.add(normalizeCode(receipt.location)));
            return Array.from(locations).filter(Boolean).sort((a, b) => a.localeCompare(b));
        }

        function isKnownLocation(value) {
            const normalized = normalizeCode(value);
            if (!normalized) return false;
            return getValidLocations().includes(normalized);
        }

        function getUnknownLocationWarning(value) {
            const normalized = normalizeCode(value);
            if (!normalized || isKnownLocation(normalized)) return '';
            return `Waarschuwing: locatie ${normalized} is onbekend in de standaardlijst.`;
        }

        function getStats() {
            return {
                assets: state.db.assets.length,
                openTasks: getOpenTasks().length,
                receiptsToday: state.db.receipts.length,
                movesToday: state.db.history.filter(item => item.type === 'move').length
            };
        }

        function getFilteredAssets() {
            const query = normalizeCode(state.moveAssetSearch);
            if (!query) return state.db.assets;
            return state.db.assets.filter(asset => {
                const serial = normalizeCode(asset.serial);
                const device = normalizeCode(asset.device);
                const description = normalizeCode(asset.description);
                return serial.includes(query) || device.includes(query) || description.includes(query);
            });
        }

        function getFilteredSortedTasks() {
            const statusFilter = state.taskStatusFilter;
            const dateSort = state.taskDateSort;
            const filtered = getVisibleTasks().filter(task => {
                if (statusFilter === 'all') return true;
                return normalizeCode(task.status) === normalizeCode(statusFilter);
            });

            return filtered.sort((a, b) => {
                const first = new Date(a.createdAt).getTime();
                const second = new Date(b.createdAt).getTime();
                return dateSort === 'oldest' ? first - second : second - first;
            });
        }

        function updateForm(section, field, value) {
            state.forms = {
                ...state.forms,
                [section]: {
                    ...state.forms[section],
                    [field]: value
                }
            };
            if (state.validation?.[section]?.[field]) {
                state.validation = {
                    ...state.validation,
                    [section]: {
                        ...state.validation[section],
                        [field]: null
                    }
                };
            }
            render();
        }

        function setFormValidation(section, errors = {}) {
            state.validation = {
                ...state.validation,
                [section]: errors
            };
        }

        function clearFormValidation(section) {
            setFormValidation(section, {});
        }

        function getFieldError(section, field) {
            return state.validation?.[section]?.[field] || '';
        }

        function getInputValidationClasses(section, field) {
            const hasError = Boolean(getFieldError(section, field));
            if (!hasError) return '';
            return state.darkMode
                ? 'border-accent ring-1 ring-accent'
                : 'border-accent ring-1 ring-accent';
        }

        function renderFieldError(section, field) {
            const message = getFieldError(section, field);
            if (!message) return '';
            return `<p class="mt-1 text-xs text-accent">${message}</p>`;
        }

        function getMissingFieldErrors(formValues, requiredFields) {
            return requiredFields.reduce((errors, fieldConfig) => {
                const value = normalizeCode(formValues[fieldConfig.key]);
                if (!value) {
                    errors[fieldConfig.key] = `Veld verplicht: ${fieldConfig.label}.`;
                }
                return errors;
            }, {});
        }

        function getMissingFieldsFlashMessage(errors) {
            const labels = Object.values(errors).map((message) => message.replace('Veld verplicht: ', '').replace('.', ''));
            if (labels.length === 0) return '';
            return `Ontbrekend(e) veld(en): ${labels.join(', ')}.`;
        }

        function LocationInput(section, field, value, placeholder, scannerTarget = null) {
            const t = getTheme();
            const datalistId = `${section}-${field}-options`;
            const warning = getUnknownLocationWarning(value);
            const options = getValidLocations()
                .map(location => `<option value="${location}"></option>`)
                .join('');
            return `
                <div>
                    <div class="flex items-center justify-between mb-2">
                        <label class="text-xs uppercase tracking-[0.2em] ${t.textSec}">${placeholder}</label>
                        ${scannerTarget ? `<button onclick="window.openScanner('${scannerTarget}')" class="text-xs px-3 py-1 rounded-full border ${t.chip}">Scan</button>` : ''}
                    </div>
                    <input value="${value}" list="${datalistId}" oninput="window.updateLocationField('${section}', '${field}', this.value)" placeholder="${placeholder}" class="w-full rounded-xl border px-3 py-3 outline-none ${t.input} ${getInputValidationClasses(section, field)}" />
                    <datalist id="${datalistId}">${options}</datalist>
                    ${renderFieldError(section, field)}
                    ${warning ? `<p class="mt-2 text-xs text-amber-300">${warning}</p>` : `<p class="mt-2 text-xs ${t.textSec}">Kies uit suggesties of typ handmatig voor niet-standaard locaties.</p>`}
                </div>
            `;
        }

        function applyReceiptPrefill(code, sourceField = 'serial') {
            const asset = getAssetByCode(code);
            if (!asset) {
                state.receiptPrefill = null;
                return null;
            }

            state.forms.receipt = {
                ...state.forms.receipt,
                serial: asset.serial,
                device: asset.device,
                location: asset.location
            };
            state.receiptPrefill = {
                serial: asset.serial,
                sourceField
            };
            return asset;
        }

        function moveAsset({ serial, toLocation, note = '', source = 'Direct', linkedTaskId = null }) {
            const asset = getAssetBySerial(serial);
            if (!asset) {
                setFlash('Serienummer niet gevonden.', 'warning');
                return;
            }

            const destination = normalizeCode(toLocation);
            if (!destination) {
                setFlash('Doellocatie ontbreekt.', 'warning');
                return;
            }

            const fromLocation = asset.location;
            asset.location = destination;
            asset.status = getStatusForLocation(destination);
            asset.updatedAt = nowIso();

            state.db.history.unshift({
                id: makeId('HIS'),
                type: 'move',
                serial: asset.serial,
                device: asset.device,
                fromLocation,
                toLocation: destination,
                operator: state.user.initials,
                note: note || source,
                createdAt: nowIso()
            });

            if (linkedTaskId) {
                const task = state.db.tasks.find(item => item.id === linkedTaskId);
                if (task) task.status = 'Voltooid';
            }

            state.forms.move = { serial: '', toLocation: '', note: '' };
            clearFormValidation('move');
            state.activeTaskId = null;
            setState({ db: state.db, forms: state.forms, activeTaskId: state.activeTaskId });
            if (isKnownLocation(destination)) {
                setFlash(`Machine ${asset.serial} verplaatst van ${fromLocation} naar ${destination} door ${state.user.initials}.`);
            } else {
                setFlash(`Machine ${asset.serial} verplaatst van ${fromLocation} naar ${destination} door ${state.user.initials}. Let op: onbekende locatiecode.`, 'warning');
            }
        }

        function receiveAsset() {
            const form = state.forms.receipt;
            const serial = normalizeCode(form.serial);
            const device = normalizeCode(form.device);
            const location = normalizeCode(form.location);
            const receiptNumber = normalizeCode(form.receiptNumber);
            const externalNumber = normalizeCode(form.externalNumber);

            const requiredFields = [
                { key: 'receiptNumber', label: 'Pakbonnummer' },
                { key: 'externalNumber', label: 'Extern nummer' },
                { key: 'serial', label: 'Serienummer' },
                { key: 'device', label: 'Devicenummer' },
                { key: 'location', label: 'Locatie' }
            ];
            const missingFieldErrors = getMissingFieldErrors(form, requiredFields);
            if (Object.keys(missingFieldErrors).length > 0) {
                setFormValidation('receipt', missingFieldErrors);
                setFlash(getMissingFieldsFlashMessage(missingFieldErrors), 'warning');
                render();
                return;
            }
            clearFormValidation('receipt');

            let asset = getAssetByCode(serial) || getAssetByCode(device);
            const isNew = !asset;

            if (!asset) {
                asset = {
                    serial,
                    device,
                    description: 'Nieuw ontvangen machine',
                    location,
                    status: 'Ontvangst',
                    updatedAt: nowIso()
                };
                state.db.assets.unshift(asset);
            } else {
                asset.device = device;
                asset.location = location;
                asset.status = 'Ontvangst';
                asset.updatedAt = nowIso();
            }

            state.db.receipts.unshift({
                id: makeId('RCV'),
                receiptNumber,
                externalNumber,
                serial,
                device,
                location,
                operator: state.user.initials,
                createdAt: nowIso()
            });

            state.db.history.unshift({
                id: makeId('HIS'),
                type: 'receipt',
                serial,
                device,
                fromLocation: isNew ? 'LEVERANCIER' : 'ONBEKEND',
                toLocation: location,
                operator: state.user.initials,
                note: `Ontvangst ${receiptNumber} / ${externalNumber}`,
                createdAt: nowIso()
            });

            state.forms.receipt = { receiptNumber: '', externalNumber: '', serial: '', device: '', location: 'INK-01' };
            state.receiptPrefill = null;
            setState({ db: state.db, forms: state.forms, receiptPrefill: state.receiptPrefill });
            if (isKnownLocation(location)) {
                setFlash(`Ontvangst opgeslagen: ${serial} op ${location} door ${state.user.initials} (pakbon ${receiptNumber}).`);
            } else {
                setFlash(`Ontvangst opgeslagen: ${serial} op ${location} door ${state.user.initials} (pakbon ${receiptNumber}). Let op: onbekende locatiecode.`, 'warning');
            }
        }

        function createTask() {
            if (state.user?.role !== 'planner') {
                setFlash('Alleen planners kunnen nieuwe opdrachten aanmaken.', 'warning');
                return;
            }
            const form = state.forms.task;
            const serial = normalizeCode(form.serial);
            const fromLocation = normalizeCode(form.fromLocation);
            const toLocation = normalizeCode(form.toLocation);
            const notes = (form.notes || '').trim();
            const assignee = normalizeCode(form.assignee) || 'MON';

            const requiredFields = [
                { key: 'serial', label: 'Serienummer' },
                { key: 'fromLocation', label: 'Van locatie' },
                { key: 'toLocation', label: 'Naar locatie' }
            ];
            const missingFieldErrors = getMissingFieldErrors(form, requiredFields);
            if (Object.keys(missingFieldErrors).length > 0) {
                setFormValidation('task', missingFieldErrors);
                setFlash(getMissingFieldsFlashMessage(missingFieldErrors), 'warning');
                render();
                return;
            }
            clearFormValidation('task');

            state.db.tasks.unshift({
                id: makeId('REQ'),
                serial,
                fromLocation,
                toLocation,
                requester: state.user.initials,
                assignee,
                notes,
                status: 'Open',
                createdAt: nowIso()
            });

            state.forms.task = { serial: '', fromLocation: '', toLocation: '', notes: '', assignee };
            setState({ db: state.db, forms: state.forms });
            if (isKnownLocation(fromLocation) && isKnownLocation(toLocation)) {
                setFlash(`Opdracht aangemaakt voor ${serial}: ${fromLocation} → ${toLocation}, toegewezen aan ${assignee}.`);
            } else {
                setFlash(`Opdracht aangemaakt voor ${serial}: ${fromLocation} → ${toLocation}, toegewezen aan ${assignee}. Let op: onbekende locatiecode ingevoerd.`, 'warning');
            }
        }

        function useTask(taskId) {
            const task = state.db.tasks.find(item => item.id === taskId);
            if (!task) return;
            if (state.user?.role === 'monteur' && normalizeCode(task.assignee) !== normalizeCode(state.user.initials)) {
                setFlash('Je kunt alleen eigen toegewezen taken openen.', 'warning');
                return;
            }
            state.forms.move = {
                serial: task.serial,
                toLocation: task.toLocation,
                note: `Opdracht ${task.id} - ${task.notes || 'Geen opmerking'}`
            };
            state.activeTaskId = task.id;
            setState({ forms: state.forms, activeTaskId: task.id, view: 'move' });
        }

        function renderFlash() {
            if (!state.flash) return '';
            const palette = state.flash.variant === 'warning'

                : 'bg-emerald-500/15 border-emerald-500/30 text-emerald-100';
            return `

                    <div class="rounded-2xl border px-4 py-3 backdrop-blur-xl ${palette}">${state.flash.message}</div>
                </div>
            `;
        }

        function routeScanResult(rawValue) {
            const value = normalizeCode(rawValue);
            if (!value) return;
            switch (state.scannerTarget) {
                case 'move-serial':
                    updateForm('move', 'serial', value);
                    break;
                case 'move-location':
                    updateForm('move', 'toLocation', value);
                    break;
                case 'task-serial':
                    updateForm('task', 'serial', value);
                    const asset = getAssetByCode(value);
                    if (asset) updateForm('task', 'fromLocation', asset.location);
                    break;
                case 'receipt-serial':
                    applyReceiptPrefill(value, 'serial');
                    if (!state.receiptPrefill) {
                        updateForm('receipt', 'serial', value);
                    } else {
                        render();
                    }
                    break;
                case 'receipt-device':
                    applyReceiptPrefill(value, 'device');
                    if (!state.receiptPrefill) {
                        updateForm('receipt', 'device', value);
                    } else {
                        render();
                    }
                    break;
                case 'receipt-location':
                    updateForm('receipt', 'location', value);
                    break;
            }
            closeScanner();
        }

        window.handleInitials = (value) => {
            const initials = normalizeCode(value).slice(0, 4);
            state.loginInitials = initials;
            const matchedUser = getMockUserByInitials(initials);
            if (matchedUser) state.loginRole = matchedUser.role;
            render();
        };

        window.selectMockUser = (initials) => {
            const matchedUser = getMockUserByInitials(initials);
            state.loginInitials = normalizeCode(initials);
            if (matchedUser) state.loginRole = matchedUser.role;
            render();
        };

        window.login = () => {
            const initials = normalizeCode(state.loginInitials || '');
            if (initials.length < 2 || initials.length > 4) {
                setFlash('Gebruik 2 tot 4 initialen.', 'warning');
                return;
            }
            const matchedUser = getMockUserByInitials(initials);
            const role = matchedUser?.role || state.loginRole;
            state.user = { initials, role, name: matchedUser?.name || 'Mock gebruiker' };
            setState({ user: state.user, view: 'dashboard' });
        };

        window.logout = () => {
            state.user = null;
            state.view = 'login';
            render();
        };

        window.navigate = (view) => {
            if (!canAccessView(view)) {
                setFlash('Deze rol heeft geen toegang tot dit onderdeel.', 'warning');
                return;
            }
            setState({ view, showNavOverflow: false });
        };
        window.toggleNavOverflow = () => {
            state.showNavOverflow = !state.showNavOverflow;
            render();
        };
        window.toggleTheme = () => { state.darkMode = !state.darkMode; render(); };
        window.updateLocationField = (section, field, value) => updateForm(section, field, value);
        window.updateMoveField = (field, value) => updateForm('move', field, value);
        window.updateTaskField = (field, value) => updateForm('task', field, value);
        window.updateReceiptField = (field, value) => {
            updateForm('receipt', field, value);
            if (field === 'serial' || field === 'device') {
                const source = field === 'device' ? 'device' : 'serial';
                const entered = normalizeCode(value);
                if (entered) {
                    applyReceiptPrefill(entered, source);
                } else if (!normalizeCode(state.forms.receipt.serial) && !normalizeCode(state.forms.receipt.device)) {
                    state.receiptPrefill = null;
                }
                render();
            }
        };
        window.updateScannerManual = (value) => { state.scannerManualValue = value; render(); };
        window.updateMoveAssetSearch = (value) => {
            state.moveAssetSearch = value;
            state.moveVisibleAssets = 6;
            render();
        };
        window.loadMoreMoveAssets = () => {
            state.moveVisibleAssets += 6;
            render();
        };
        window.setTaskStatusFilter = (value) => {
            state.taskStatusFilter = value;
            render();
        };
        window.setTaskDateSort = (value) => {
            state.taskDateSort = value;
            render();
        };
        window.prefillMove = (serial) => { updateForm('move', 'serial', serial); setState({ view: 'move' }); };
        window.clearTaskLink = () => setState({ activeTaskId: null });
        window.useTask = useTask;
        window.resetMockData = resetMockData;
        window.openExportModal = () => {
            state.showExportModal = true;
            state.exportCopied = false;
            render();
        };
        window.closeExportModal = () => {
            state.showExportModal = false;
            state.exportCopied = false;
            render();
        };
        window.downloadExportJson = () => {
            downloadExportJson();
            setFlash('JSON-export gedownload.');
        };
        window.copyExportJson = async () => {
            const payload = getExportJson();
            try {
                if (navigator.clipboard?.writeText) {
                    await navigator.clipboard.writeText(payload);
                } else {
                    const helper = document.createElement('textarea');
                    helper.value = payload;
                    helper.style.position = 'fixed';
                    helper.style.opacity = '0';
                    document.body.appendChild(helper);
                    helper.focus();
                    helper.select();
                    document.execCommand('copy');
                    helper.remove();
                }
                state.exportCopied = true;
                render();
                setFlash('JSON-export gekopieerd naar klembord.');
            } catch (error) {
                setFlash('Kopiëren mislukt. Gebruik download als alternatief.', 'warning');
            }
        };

        window.submitMove = () => {
            if (!canAccessView('move')) {
                setFlash('Geen rechten voor verplaatsen met deze rol.', 'warning');
                return;
            }
            const form = state.forms.move;
            const requiredFields = [
                { key: 'serial', label: 'Serienummer of devicenummer' },
                { key: 'toLocation', label: 'Doellocatie' }
            ];
            const missingFieldErrors = getMissingFieldErrors(form, requiredFields);
            if (Object.keys(missingFieldErrors).length > 0) {
                setFormValidation('move', missingFieldErrors);
                setFlash(getMissingFieldsFlashMessage(missingFieldErrors), 'warning');
                render();
                return;
            }
            clearFormValidation('move');
            const asset = getAssetByCode(form.serial);
            if (!asset) {
                setFlash('Machine niet gevonden op serienummer of devicenummer.', 'warning');
                return;
            }
            moveAsset({
                serial: asset.serial,
                toLocation: form.toLocation,
                note: form.note,
                source: state.activeTaskId ? `Opdracht ${state.activeTaskId}` : 'Directe verplaatsing',
                linkedTaskId: state.activeTaskId
            });
        };

        window.submitTask = createTask;
        window.submitReceipt = () => {
            if (!canAccessView('receive')) {
                setFlash('Geen rechten voor goederenontvangst met deze rol.', 'warning');
                return;
            }
            receiveAsset();
        };

        function startCamera() {
            const reader = new Html5Qrcode('reader');
            state.html5QrCode = reader;
            reader.start(
                { facingMode: 'environment' },
                { fps: 10, qrbox: { width: 240, height: 240 } },
                (decodedText) => routeScanResult(decodedText),
                () => {}
            ).catch(() => {
                setFlash('Camera start niet. Gebruik mock input onderaan.', 'warning');
            });
        }

        function closeScanner() {
            if (state.html5QrCode) {
                state.html5QrCode.stop().then(() => {
                    state.html5QrCode.clear();
                    state.html5QrCode = null;
                    state.showScanner = false;
                    state.scannerTarget = null;
                    state.scannerManualValue = '';
                    render();
                }).catch(() => {
                    state.html5QrCode = null;
                    state.showScanner = false;
                    state.scannerTarget = null;
                    state.scannerManualValue = '';
                    render();
                });
                return;
            }
            state.showScanner = false;
            state.scannerTarget = null;
            state.scannerManualValue = '';
            render();
        }

        window.closeScanner = closeScanner;
        window.openScanner = (target) => {
            state.showScanner = true;
            state.scannerTarget = target;
            state.scannerManualValue = '';
            render();
            setTimeout(startCamera, 120);
        };
        window.confirmManualScan = () => routeScanResult(state.scannerManualValue);

        function render() {
            syncBodyTheme();
            const app = document.getElementById('app');
            let html = '';
            if (!state.user || state.view === 'login') {
                html = renderLogin();
            } else if (!canAccessView(state.view)) {
                state.view = 'dashboard';
                html = renderDashboard();
            } else if (state.view === 'dashboard') {
                html = renderDashboard();
            } else if (state.view === 'move') {
                html = renderMove();
            } else if (state.view === 'tasks') {
                html = renderTasks();
            } else if (state.view === 'receive') {
                html = renderReceive();
            } else if (state.view === 'history') {
                html = renderHistory();
            } else if (state.view === 'datamodel') {
                html = renderDatamodel();
            }
            app.innerHTML = html + renderScanner() + renderExportModal() + renderFlash();
            lucide.createIcons();
        }

        render();
    </script>
</body>
</html>
