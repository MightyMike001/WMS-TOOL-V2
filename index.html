        .kpi-compact { opacity: 0; transform: translateY(10px); transition: all 0.4s ease; pointer-events: none; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }

        .is-scrolled .kpi-expanded { opacity: 0; transform: translateY(-10px); pointer-events: none; }

                const parsed = JSON.parse(raw);
                return {
                    assets: Array.isArray(parsed.assets) ? parsed.assets : null,
                    moveRequests: Array.isArray(parsed.moveRequests) ? parsed.moveRequests : (Array.isArray(parsed.moves) ? parsed.moves : null),

                console.warn('Kon localStorage mockdata niet laden:', error);

            completed: { label: 'Voltooid', chip: 'bg-emerald-500/15 text-emerald-200 border border-emerald-500/30' },
        };

        const priorityRank = { high: 0, normal: 1, low: 2 };

        const sortPickItems = (items, option = 'default') => {
            if (option === 'default') return items;

            const sorted = [...items];
            switch (option) {
                case 'name':
                    sorted.sort((a, b) => (a.name || '').localeCompare(b.name || ''));
                    break;
                case 'location':
                    sorted.sort((a, b) => (a.location || '').localeCompare(b.location || ''));
                    break;
                case 'sku':
                    sorted.sort((a, b) => (a.id || '').localeCompare(b.id || ''));
                    break;
            }
            return sorted;
        };

        const prepareOrderLines = (lines = []) =>
            lines.map((line) => ({
                ...line,
                searchIndex: `${line.name || ''} ${line.id || ''} ${line.location || ''}`.toLowerCase(),
            }));

        let pickListCache = { key: '', items: [], source: null };

        const getFilteredPickItems = () => {
            const sourceItems = Array.isArray(state.pickItems) ? state.pickItems : [];
            const searchTerm = (state.pickSearchTerm || '').trim().toLowerCase();
            const cacheKey = `${state.pickSortOption}|${searchTerm}|${sourceItems.length}`;

            if (pickListCache.key === cacheKey && pickListCache.source === sourceItems) {
                return pickListCache.items;
            }

            const filteredItems = searchTerm
                ? sourceItems.filter((item) => (item.searchIndex || '').includes(searchTerm))
                : sourceItems;

            const sortedItems = sortPickItems(filteredItems, state.pickSortOption);
            pickListCache = { key: cacheKey, items: sortedItems, source: sourceItems };
            return sortedItems;
        };

        const sortOrders = (orders) => {
            const sorted = [...orders];
            sorted.sort((a, b) => {
                if (state.sortOption === 'destination') {
                    const destA = (a.destination || '').localeCompare(b.destination || '');
                    return destA;
                }
                if (state.sortOption === 'createdAt') {
                    return new Date(b.createdAt).getTime() - new Date(a.createdAt).getTime();
                }
                return (priorityRank[a.priority] ?? 99) - (priorityRank[b.priority] ?? 99);
            });
            return sorted;
        };

        async function fetchOrderLines(orderId) {
            const endpoint = `/api/orders/${orderId}/lines`;

            try {
                const response = await fetch(endpoint, { cache: 'no-store' });

                if (response.ok) {
                    const data = await response.json();
                    if (Array.isArray(data) && data.length > 0) {
                        return data;
                    }
                }

                throw new Error('Geen orderregels gevonden in backend respons.');
            } catch (error) {
                console.warn('Orderregels ophalen mislukt, val terug op mock data.', error);

                const cachedLines = state.orderLineMap?.[orderId];

                if (cachedLines) {
                    return cachedLines;
                }

                if (MOCK_ORDER_LINES[orderId]) {
                    return MOCK_ORDER_LINES[orderId];
                }

                throw new Error('Geen orderregels gevonden voor deze order.');
            }
        }

        async function loadOrderLines(orderId) {
            setState({
                isLoadingOrderLines: true,
                orderLineError: null,
                pickItems: [],
                pickedItems: new Set(),
                scanFeedback: null
            });

            try {
                const lines = prepareOrderLines(await fetchOrderLines(orderId));

                const orderIndex = MOCK_ORDERS.findIndex(o => o.id === orderId);
                const updatedOrder = orderIndex !== -1
                    ? MOCK_ORDERS[orderIndex]
                    : (state.activeOrder && state.activeOrder.id === orderId
                        ? state.activeOrder
                        : state.activeOrder);

                const updatedOrderLineState = {
                    ...state.orderLineState,
                    [orderId]: {
                        totalLines: lines.length,
                        remainingLines: state.orderLineState[orderId]?.remainingLines ?? lines.length,
                    }
                };

                setState({
                    pickItems: lines,
                    isLoadingOrderLines: false,
                    activeOrder: updatedOrder,
                    orderLineMap: { ...state.orderLineMap, [orderId]: lines },
                    orderLineState: updatedOrderLineState,
                });
            } catch (error) {
                setState({
                    isLoadingOrderLines: false,
                    orderLineError: error.message || 'Geen orderregels gevonden voor deze order.',
                    pickItems: [],
                });
            }
        }

        const getOrderLineCountsForOrder = (order) => deriveOrderLineCounts(order, state.orderLineState, state.orderLineMap);

        async function initializeOrderLineCounts() {
            if (state.isLoadingInitialOrderLines || state.initialOrderLinesLoaded) {
                return;
            }

            setState({ isLoadingInitialOrderLines: true });

            try {
                const initializedOrderLineMap = { ...state.orderLineMap };
                const initializedOrderLineState = { ...state.orderLineState };

                await Promise.all(MOCK_ORDERS.map(async (order) => {
                    try {
                        const lines = prepareOrderLines(await fetchOrderLines(order.id));
                        initializedOrderLineMap[order.id] = lines;
                        initializedOrderLineState[order.id] = {
                            totalLines: lines.length,
                            remainingLines: initializedOrderLineState[order.id]?.remainingLines ?? lines.length,
                        };
                    } catch (error) {
                        console.warn(`Initialiseren van orderregels mislukt voor ${order.id}`, error);
                    }
                }));

                setState({
                    initialOrderLinesLoaded: true,
                    orderLineMap: initializedOrderLineMap,
                    orderLineState: initializedOrderLineState,
                });
            } finally {
                setState({ isLoadingInitialOrderLines: false });
            }
        }

                            <div class="flex gap-3">
                                <div class="w-10 h-10 rounded-full flex items-center justify-center shrink-0 z-10 transition-colors ${scanStep > 1 ? 'bg-emerald-500 text-white shadow-lg' : (state.darkMode ? 'bg-[#050505] border border-white/20' : 'bg-white border border-slate-200')}">
                                    <i data-lucide="${scanStep > 1 ? 'check-circle' : 'map-pin'}" width="18"></i>
                                </div>
                                ${GlassCard(`
                                    <h3 class="${state.darkMode ? 'text-white/60' : 'text-slate-600'} text-xs uppercase mb-0.5 font-medium tracking-wider">Stap 2</h3>
                                    <div class="text-lg font-bold ${t.textMain} mb-2">Scan Locatie</div>
                                    ${scannedData.location ? `<div class="bg-emerald-500/10 border border-emerald-500/20 rounded-xl p-2 flex items-center gap-2"><i data-lucide="map-pin" class="text-emerald-500" width="16"></i><span class="text-emerald-500 font-mono text-base">${scannedData.location}</span></div>` : Button('Start Camera', scanStep >= 1 ? "openScanner('asset-location')" : '', scanStep >= 1 ? 'primary' : 'secondary', 'camera', scanStep === 0)}
                                `, null, 'flex-1')}
                            </div>
                        </div>
                        ${scanStep === 2 ? GlassCard(`
                            <div class="flex items-start gap-3 mb-3">
                                <div class="bg-yellow-500/20 p-2 rounded-full text-yellow-500"><i data-lucide="alert-triangle" width="20"></i></div>
                                <div><h3 class="${t.textMain} font-bold text-base">Bevestig</h3><p class="${t.textSec} text-xs mt-0.5">Koppel truck <strong>${scannedData.truck}</strong> aan <strong>${scannedData.location}</strong>?</p></div>
                            </div>
                            <div class="flex gap-3 mt-3"><button onclick="resetLoc()" class="flex-1 py-2 rounded-xl bg-white/10 text-white text-sm">Wijzig</button><button onclick="confirmAssetLink()" class="flex-1 py-2 rounded-xl bg-emerald-600 text-white shadow-lg text-sm">Bevestig</button></div>
                        `, null, 'border-l-4 border-l-yellow-500 animate-pulse') : ''}
                    </div>
                `;
            }

            return `
                 <div class="h-full flex flex-col px-4 pt-4 pb-2 overflow-hidden">
                    <div class="flex items-center gap-3 mb-4 shrink-0">
                        <button onclick="navigate('dashboard')" class="p-2 rounded-full ${state.darkMode ? 'bg-white/10 hover:bg-white/20 text-white' : 'bg-white border border-slate-200 hover:bg-slate-50 text-slate-900'} transition-colors"><i data-lucide="arrow-left" width="20"></i></button>
                        <h1 class="text-lg font-bold ${t.textMain}">Heftruck Lokalisatie</h1>
                    </div>
                    ${content}
                </div>
            `;
        }

        function renderNav() {
            const t = getTheme();
            return GlassCard(`
                <div class="flex justify-around items-center">
                    <button onclick="navigate('dashboard')" class="p-2 rounded-xl transition-colors ${state.view === 'dashboard' ? 'text-red-500 bg-red-500/10' : `${t.textSec} hover:${t.textMain}`}">
                        <i data-lucide="box" width="20"></i>
                    </button>
                    <button onclick="navigate('asset-scan')" class="p-2 rounded-xl transition-colors ${state.view === 'asset-scan' ? 'text-red-500 bg-red-500/10' : `${t.textSec} hover:${t.textMain}`}">
                        <i data-lucide="truck" width="20"></i>
                    </button>
                    <button onclick="toggleTheme()" class="p-2 rounded-xl transition-colors ${state.darkMode ? 'text-yellow-400 hover:bg-white/10' : 'text-slate-600 hover:bg-black/5'}">
                        <i data-lucide="${state.darkMode ? 'sun' : 'moon'}" width="20"></i>
                    </button>
                </div>
            `, null, `mt-0 !p-1.5 flex-none ${t.navGlass} !rounded-xl`);
        }

        function renderWmsNav() {
            const t = getTheme();
            const items = [
                { view: 'dashboard', icon: 'layout-dashboard', label: 'Dashboard' },
                { view: 'move', icon: 'move-right', label: 'Move' },
                { view: 'tasks', icon: 'list-checks', label: 'Tasks' },
                { view: 'receive', icon: 'inbox', label: 'Receive' },
                { view: 'history', icon: 'history', label: 'History' },
            ];
            return GlassCard(`
                <div class="grid grid-cols-5 gap-1">
                    ${items.map(item => `
                        <button onclick="navigateWms('${item.view}')" class="p-2 rounded-xl transition-colors flex flex-col items-center gap-1 ${state.wmsView === item.view ? 'text-red-500 bg-red-500/10' : `${t.textSec} hover:${t.textMain}`}">
                            <i data-lucide="${item.icon}" width="18"></i>
                            <span class="text-[10px] leading-none">${item.label}</span>
                        </button>
                    `).join('')}
                </div>
            `, null, `mt-0 !p-1.5 flex-none ${t.navGlass} !rounded-xl`);
        }

        function renderScanner() {
            if (!state.showScanner) return '';
            const contextLabelMap = {
                picking: 'Pick-scan',
                'asset-truck': 'Serial scan',
                'asset-location': 'Location scan',
                'move-serial': 'Serial scan',
                'move-location': 'Location scan',
                'receive-serial': 'Serial scan',
                'receive-device': 'Device scan',
                'receive-location': 'Location scan',
            };
            const contextLabel = contextLabelMap[state.scannerContext] || 'Scan';
            return `
                <div class="fixed inset-0 z-50 bg-black/95 flex flex-col items-center justify-center p-3 sm:p-4 animate-[fadeIn_0.2s_ease-out]">
                    <div class="relative w-full h-full max-w-lg flex flex-col gap-3">
                        <div class="rounded-2xl overflow-hidden border border-white/20 bg-black h-[48vh] sm:h-[56vh]">
                            <div id="reader" class="w-full h-full bg-black object-cover"></div>
                        </div>
                        <div class="absolute inset-x-0 top-[9vh] pointer-events-none flex flex-col items-center justify-center">
                             <div class="w-48 h-48 sm:w-56 sm:h-56 border-2 border-white/40 rounded-2xl relative">
                                <div class="absolute inset-0 border-[26px] border-black/35 rounded-2xl"></div>
                                <div class="absolute top-1/2 left-4 right-4 h-0.5 bg-red-500 shadow-[0_0_20px_rgba(239,68,68,0.8)] animate-[ping_1.5s_cubic-bezier(0,0,0.2,1)_infinite]"></div>
                             </div>
                             <div class="mt-4 bg-black/65 px-3 py-1.5 rounded-full backdrop-blur-md text-white font-mono text-xs">${contextLabel} · Richt op barcode</div>
                        </div>
                        <div class="rounded-2xl border border-white/15 bg-black/60 backdrop-blur-md p-3 space-y-2 pointer-events-auto">
                            <p class="text-[11px] text-white/70 uppercase tracking-wider">${contextLabel} fallback</p>
                            <div class="flex gap-2">
                                <input type="text" value="${state.manualScanInput}" oninput="setManualScanInput(this.value)" onkeydown="if(event.key==='Enter'){submitScannerManualScan();}" placeholder="Typ gescande code" class="flex-1 bg-transparent border border-white/25 text-white placeholder:text-white/40 rounded-xl px-3 py-2 text-sm font-mono outline-none focus:border-red-500" />
                                <button onclick="submitScannerManualScan()" class="px-3 py-2 rounded-xl text-xs font-semibold bg-red-600 text-white hover:bg-red-500 transition-colors">Gebruik code</button>
                            </div>
                            ${state.scannerOverlayFeedback ? `<div class="text-xs px-3 py-2 rounded-lg border ${state.scannerOverlayFeedback.status === 'success' ? 'bg-emerald-500/10 border-emerald-500/30 text-emerald-200' : 'bg-amber-500/10 border-amber-500/30 text-amber-200'}">${state.scannerOverlayFeedback.message}</div>` : ''}
                            <button onclick="closeScanner()" class="w-full bg-white/15 backdrop-blur-md border border-white/20 text-white px-4 py-2 rounded-xl text-sm font-semibold shadow-lg active:scale-95 transition-transform">
                                Sluiten
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }
        
        // NIEUW: CONFIRMATION MODAL
        function renderConfirmationModal() {
            if (!state.showConfirmationModal || state.pickedItems.size === 0) return '';
            
            const t = getTheme();
            const pickedCount = state.pickedItems.size;
            const remainingCount = Math.max((state.pickItems.length || 0) - pickedCount, 0);

            return `
                <div id="confirmation-modal" class="fixed inset-0 z-50 flex items-center justify-center p-6 bg-black/50 backdrop-blur-sm modal-enter modal-enter-active">
                    ${GlassCard(`
                        <div class="flex flex-col gap-4">
                            <h3 class="${t.textMain} text-xl font-bold">Bevestig Verplaatsing</h3>
                            
                            <p class="${t.textSec} text-sm">U staat op het punt **${pickedCount}** items te verplaatsen naar **${state.activeOrder.destination}**.</p>
                            
                            <ul class="space-y-1 ${t.textSec} text-sm">
                                <li class="font-bold text-emerald-500 flex items-center gap-2"><i data-lucide="check-circle" width="16"></i> ${pickedCount} item(s) voltooid.</li>
                                <li class="text-red-400 flex items-center gap-2"><i data-lucide="alert-triangle" width="16"></i> ${remainingCount} item(s) blijven over.</li>
                            </ul>

                            <div class="flex gap-3 mt-2">
                                ${Button('Annuleren', 'closeConfirmationModal()', 'secondary', 'x', false)}
                                ${Button('Bevestig & Verplaats', 'executePicking()', 'success', 'arrow-right')}
                            </div>
                        </div>
                    `, null, 'p-6 !rounded-xl w-full max-w-sm')}
                </div>
            `;
        }

        // --- 5. HANDLERS ---
        const normalizeInitialInput = (val) => (val || '').toUpperCase().replace(/[^A-Z]/g, '').slice(0, 4);
        const isValidInitials = (value) => value.length >= 2 && value.length <= 4;
        window.handleInput = (val) => {
            state.loginInput = normalizeInitialInput(val);
            render();
            const i = document.querySelector('input');
            if (i) {
                i.focus();
                i.setSelectionRange(i.value.length, i.value.length);
            }
        };
        window.handleLogin = () => {
            const sanitizedInitials = normalizeInitialInput(state.loginInput);
            if (isValidInitials(sanitizedInitials)) {
                const nextView = state.appMode === 'wms-v1' ? 'wms-v1' : 'dashboard';
                setState({ user: { initials: sanitizedInitials }, loginInput: sanitizedInitials, view: nextView, wmsView: 'dashboard' });
                if (state.appMode !== 'wms-v1') {
                    initializeOrderLineCounts();
                }
            }
        };
        window.logout = () => setState({ user: null, view: 'login', loginInput: '', wmsView: 'dashboard' });
        window.resetDemoData = () => {
            resetWmsMockData();
            setState({
                wmsView: 'dashboard',
                moveSearchInput: '',
                moveDestinationInput: '',
                moveSelectedAssetSerial: '',
                activeMoveTaskId: null,
                moveFeedback: { status: 'success', message: 'Demo mockdata is gereset naar de beginstand.' },
                wmsScanFeedback: null,
                taskForm: { serial: '', from: '', to: '', note: '', requestedBy: '' },
                receiveForm: { deliveryNoteNumber: '', externalDocumentNumber: '', serial: '', deviceNumber: '', location: '' },
            });
        };
        window.navigate = (view) => setState({ view });
        window.navigateWms = (view) => {
            const allowed = ['login', 'dashboard', 'move', 'tasks', 'receive', 'history'];
            if (allowed.includes(view)) {
                setState({ wmsView: view, wmsScanInput: '', wmsScanFeedback: null });
            }
        };
        window.setMoveSearchInput = (value) => {
            setState({ moveSearchInput: value.toUpperCase(), moveFeedback: null, wmsScanFeedback: null });
        };
        window.setMoveDestinationInput = (value) => {
            setState({ moveDestinationInput: value.toUpperCase(), moveFeedback: null, wmsScanFeedback: null });
        };
        window.lookupMoveAsset = () => {
            const query = state.moveSearchInput || '';
            const { matchedItems, matchedBy, normalizedCode } = findMatchingAssets(query, ASSETS);

            if (!normalizedCode) {
                setState({ moveSelectedAssetSerial: '', moveFeedback: { status: 'warning', message: 'Scan of typ eerst een serienummer of device-nummer.' } });
                return;
            }

            if (!matchedItems.length || matchedBy === 'location') {
                setState({ moveSelectedAssetSerial: '', moveFeedback: { status: 'warning', message: `Geen asset gevonden voor code ${normalizedCode}.` } });
                return;
            }

            const match = matchedItems[0];
            setState({
                moveSearchInput: match[matchedBy],
                moveSelectedAssetSerial: match.serial,
                moveFeedback: {
                    status: 'success',
                    message: `Asset ${match.serial} gevonden via ${matchedBy === 'serial' ? 'serienummer' : 'device-nummer'} op ${match.location}.`,
                }
            });
        };

        window.setWmsScanInput = (value) => {
            setState({ wmsScanInput: value.toUpperCase(), wmsScanFeedback: null });
        };
        function processWmsScan(rawCode, context = state.wmsView) {
            const assetResult = findMatchingAssets(rawCode, ASSETS);
            const locationResult = findMatchingLocations(rawCode, KNOWN_LOCATIONS);
            const normalizedCode = assetResult.normalizedCode || locationResult.normalizedCode;

            if (!normalizedCode) {
                setState({ wmsScanFeedback: { status: 'warning', message: 'Scan bevat geen bruikbare code.' } });
                return;
            }

            if (context === 'move') {
                if (assetResult.matchedItems.length > 0 && assetResult.matchedBy !== 'location') {
                    const asset = assetResult.matchedItems[0];
                    setState({
                        moveSearchInput: asset[assetResult.matchedBy],
                        moveSelectedAssetSerial: asset.serial,
                        moveFeedback: { status: 'success', message: `Asset ${asset.serial} geselecteerd via ${assetResult.matchedBy === 'serial' ? 'serienummer' : 'device-nummer'}.` },
                        wmsScanFeedback: null,
                    });
                    return;
                }

                if (locationResult.matchedItems.length > 0) {
                    const location = locationResult.matchedItems[0];
                    setState({
                        moveDestinationInput: location,
                        moveFeedback: { status: 'success', message: `Doellocatie ingevuld: ${location}.` },
                        wmsScanFeedback: null,
                    });
                    return;
                }

                setState({ moveFeedback: { status: 'warning', message: `Code ${normalizedCode} is geen bekende asset of locatie.` } });
                return;
            }

            if (context === 'receive') {
                const asset = assetResult.matchedItems[0];
                const receipt = RECEIPTS.find(r => normalizeScanCode(r.serial) === normalizedCode);
                if (asset && assetResult.matchedBy !== 'location') {
                    setState({
                        receiveForm: {
                            ...state.receiveForm,
                            serial: asset.serial,
                            deviceNumber: asset.deviceNumber,
                            location: asset.location,
                        },
                        wmsScanFeedback: { status: 'success', message: `Machine ${asset.serial} herkend. Serienummer is leidend en formulier is aangevuld.` },
                    });
                    return;
                }
                if (receipt) {
                    setState({
                        receiveForm: {
                            deliveryNoteNumber: receipt.deliveryNoteNumber || '',
                            externalDocumentNumber: receipt.externalDocumentNumber || '',
                            serial: receipt.serial || '',
                            deviceNumber: receipt.deviceNumber || '',
                            location: receipt.dock || '',
                        },
                        wmsScanFeedback: { status: 'success', message: `Ontvangst ${receipt.id} geladen voor serial ${receipt.serial}.` },
                    });
                    return;
                }
                if (locationResult.matchedItems.length > 0) {
                    setState({
                        receiveForm: {
                            ...state.receiveForm,
                            location: locationResult.matchedItems[0],
                        },
                        wmsScanFeedback: { status: 'success', message: `Dock/locatie herkend: ${locationResult.matchedItems[0]}.` },
                    });
                    return;
                }
                setState({ wmsScanFeedback: { status: 'warning', message: `Geen ontvangstmatch voor code ${normalizedCode}.` } });
                return;
            }

            if (context === 'tasks') {
                const openTasks = getOpenMoveTasks();
                const taskBySerial = openTasks.find(task => normalizeScanCode(task.serial) === normalizedCode);
                const taskByLocation = openTasks.find(task => normalizeScanCode(task.to) === normalizedCode || normalizeScanCode(task.from) === normalizedCode);
                if (taskBySerial) {
                    setState({ wmsScanFeedback: { status: 'success', message: `Opdracht ${taskBySerial.id} gevonden voor serial ${taskBySerial.serial}.` } });
                    return;
                }
                if (taskByLocation) {
                    setState({ wmsScanFeedback: { status: 'success', message: `Opdracht ${taskByLocation.id} gevonden voor locatie ${taskByLocation.from} → ${taskByLocation.to}.` } });
                    return;
                }
                setState({ wmsScanFeedback: { status: 'warning', message: `Geen open opdracht voor code ${normalizedCode}.` } });
            }
        }
        window.submitWmsScan = (context = state.wmsView) => {
            const code = state.wmsScanInput || '';
            processWmsScan(code, context);
            setState({ wmsScanInput: '' });
        };
        window.updateTaskForm = (field, value) => {
            if (!['serial', 'from', 'to', 'note', 'requestedBy'].includes(field)) return;
            const shouldUppercase = ['serial', 'from', 'to', 'requestedBy'].includes(field);
            setState({
                taskForm: {
                    ...state.taskForm,
                    [field]: shouldUppercase ? value.toUpperCase() : value,
                },
                wmsScanFeedback: null,
            });
        };
        window.updateReceiveForm = (field, value) => {
            if (!['deliveryNoteNumber', 'externalDocumentNumber', 'serial', 'deviceNumber', 'location'].includes(field)) return;
            setState({
                receiveForm: {
                    ...state.receiveForm,
                    [field]: value.toUpperCase(),
                },
                wmsScanFeedback: null,
            });
        };
        window.submitReceiveForm = () => {
            const deliveryNoteNumber = (state.receiveForm.deliveryNoteNumber || '').trim().toUpperCase();
            const externalDocumentNumber = (state.receiveForm.externalDocumentNumber || '').trim().toUpperCase();
            const serial = (state.receiveForm.serial || '').trim().toUpperCase();
            const deviceNumber = (state.receiveForm.deviceNumber || '').trim().toUpperCase();
            const location = (state.receiveForm.location || '').trim().toUpperCase();

            if (!serial || !deliveryNoteNumber || !externalDocumentNumber || !deviceNumber || !location) {
                setState({ wmsScanFeedback: { status: 'warning', message: 'Vul pakbonnummer, extern nummer, serienummer, devicenummer en ontvangstlocatie in.' } });
                return;
            }

            const now = new Date().toISOString();
            const actor = state.user?.initials || 'SYS';
            const existingAssetIndex = ASSETS.findIndex(asset => normalizeScanCode(asset.serial) === normalizeScanCode(serial));
            const existingAsset = existingAssetIndex !== -1 ? ASSETS[existingAssetIndex] : null;
            const previousLocation = existingAsset?.location || '-';
            const isNewAsset = !existingAsset;

            if (existingAsset) {
                ASSETS[existingAssetIndex] = {
                    ...existingAsset,
                    deviceNumber,
                    location,
                    status: 'receiving',
                    updatedAt: now,
                };
            } else {
                ASSETS.unshift({
                    serial,
                    deviceNumber,
                    description: 'Nieuwe asset via goederenontvangst',
                    location,
                    status: 'receiving',
                    updatedAt: now,
                });
            }

            const receiptId = `RCV-${now.slice(2, 10).replace(/-/g, '')}-${String(RECEIPTS.length + 1).padStart(3, '0')}`;
            RECEIPTS.unshift({
                id: receiptId,
                serial,
                deviceNumber,
                deliveryNoteNumber,
                externalDocumentNumber,
                dock: location,
                supplier: 'Onbekend / handmatig',
                status: 'received',
                receivedAt: now,
            });

            MOVE_TRANSACTIONS.unshift({
                id: `LOG-${Date.now()}`,
                type: 'receipt',
                serial,
                deviceNumber,
                from: previousLocation,
                to: location,
                operator: actor,
                timestamp: now,
                note: isNewAsset ? 'Nieuwe asset ontvangen' : 'Ontvangst verwerkt',
            });
            persistWmsData();

            setState({
                receiveForm: { deliveryNoteNumber: '', externalDocumentNumber: '', serial: '', deviceNumber: '', location: '' },
                moveSelectedAssetSerial: serial,
                wmsScanFeedback: {
                    status: 'success',
                    message: isNewAsset
                        ? `Ontvangst ${receiptId} geregistreerd. Nieuwe asset ${serial} toegevoegd op ${location}.`
                        : `Ontvangst ${receiptId} geregistreerd. Asset ${serial} bijgewerkt naar ${location}.`,
                },
            });
        };
        window.createMoveTask = () => {
            const serial = (state.taskForm.serial || '').trim().toUpperCase();
            const from = (state.taskForm.from || '').trim().toUpperCase();
            const to = (state.taskForm.to || '').trim().toUpperCase();
            const note = (state.taskForm.note || '').trim();
            const requestedBy = (state.taskForm.requestedBy || '').trim().toUpperCase();
            if (!serial || !from || !to || !requestedBy) {
                setState({ wmsScanFeedback: { status: 'warning', message: 'Vul serienummer, van-locatie, naar-locatie en aanvrager in.' } });
                return;
            }
            const id = `MOVE-${new Date().toISOString().slice(2, 10).replace(/-/g, '')}-${String(MOVE_REQUESTS.length + 1).padStart(3, '0')}`;
            MOVE_REQUESTS.unshift({
                id,
                serial,
                from,
                to,
                note,
                requestedBy,
                priority: 'normal',
                status: 'open',
                createdAt: new Date().toISOString(),
                completedAt: null,
            });
            persistWmsData();
            setState({
                taskForm: { serial: '', from: '', to: '', note: '', requestedBy: '' },
                wmsScanFeedback: { status: 'success', message: `Opdracht ${id} aangemaakt.` },
            });
        };
        window.startMoveFromTask = (taskId) => {
            const task = MOVE_REQUESTS.find(item => item.id === taskId && item.status === 'open');
            if (!task) {
                setState({ wmsScanFeedback: { status: 'warning', message: `Opdracht ${taskId} is niet meer open.` } });
                return;
            }
            setState({
                wmsView: 'move',
                moveSearchInput: task.serial,
                moveDestinationInput: task.to,
                moveSelectedAssetSerial: task.serial,
                activeMoveTaskId: task.id,
                moveFeedback: { status: 'success', message: `Opdracht ${task.id} gestart. Controleer asset en bevestig verplaatsing.` },
                wmsScanFeedback: null,
            });
        };

        window.confirmMoveAsset = () => {
            const rawDestination = state.moveDestinationInput || '';
            const { matchedItems: matchedLocations, normalizedCode } = findMatchingLocations(rawDestination, KNOWN_LOCATIONS);
            const destination = matchedLocations[0] || '';
            const selectedIndex = ASSETS.findIndex(asset => asset.serial === state.moveSelectedAssetSerial);
            if (selectedIndex === -1) {
                setState({ moveFeedback: { status: 'warning', message: 'Selecteer eerst een asset via serienummer of device-nummer.' } });
                return;
            }
            if (!normalizedCode) {
                setState({ moveFeedback: { status: 'warning', message: 'Doellocatie ontbreekt. Scan of typ een locatie.' } });
                return;
            }
            if (!destination) {
                setState({ moveFeedback: { status: 'warning', message: `Onbekende locatiecode ${normalizedCode}.` } });
                return;
            }

            const selectedAsset = ASSETS[selectedIndex];
            const fromLocation = selectedAsset.location;
            const now = new Date().toISOString();
            ASSETS[selectedIndex] = {
                ...selectedAsset,
                location: destination,
                updatedAt: now,
                status: 'available',
            };

            const historyEntry = {
                id: `LOG-${Date.now()}`,
                type: 'move',
                serial: selectedAsset.serial,
                deviceNumber: selectedAsset.deviceNumber,
                from: fromLocation,
                to: destination,
                operator: state.user?.initials || 'SYS',
                timestamp: now,
                note: state.activeMoveTaskId ? `Verplaatsing vanuit opdracht ${state.activeMoveTaskId}` : 'Verplaatsing bevestigd',
            };
            MOVE_TRANSACTIONS.unshift(historyEntry);

            if (state.activeMoveTaskId) {
                const taskIndex = MOVE_REQUESTS.findIndex(task => task.id === state.activeMoveTaskId && task.status === 'open');
                if (taskIndex !== -1) {
                    MOVE_REQUESTS[taskIndex] = {
                        ...MOVE_REQUESTS[taskIndex],
                        status: 'completed',
                        completedAt: now,
                    };
                }
            }
            persistWmsData();

            setState({
                moveDestinationInput: '',
                moveSearchInput: '',
                moveSelectedAssetSerial: selectedAsset.serial,
                activeMoveTaskId: null,
                moveFeedback: {
                    status: 'success',
                    message: `Verplaatsing bevestigd: ${selectedAsset.serial} van ${fromLocation} naar ${destination}.`,
                }
            });
        };
        window.setAppMode = (mode) => {
            const allowed = ['orderflow', 'wms-v1'];
            if (allowed.includes(mode)) {
                setState({ appMode: mode });
            }
        };
        window.toggleTheme = () => {
            const nextDarkMode = !state.darkMode;
            setState({ darkMode: nextDarkMode });
        };
        window.setSortOption = (option) => {
            const allowed = ['priority', 'destination', 'createdAt'];
            if (allowed.includes(option)) {
                setState({ sortOption: option });
            }
        };
        window.handlePickSearch = (value) => setState({ pickSearchTerm: value });
        window.setPickSortOption = (option) => {
            const allowed = ['default', 'name', 'location', 'sku'];
            if (allowed.includes(option)) {
                setState({ pickSortOption: option });
            }
        };
        window.openOrder = (id) => {
            const order = MOCK_ORDERS.find(x => x.id === id);
            if (!order) return;

            setState({
                activeOrder: order,
                view: 'picking',
                pickedItems: new Set(),
                pickSearchTerm: '',
                pickSortOption: 'default',
                isEditingDestination: false,
                scanFeedback: null,
                orderLineError: null,
            });

            loadOrderLines(order.id);
        };
        window.togglePickItem = (id) => { const s = new Set(state.pickedItems); if(s.has(id))s.delete(id);else s.add(id); setState({ pickedItems: s }); };
        window.setManualScanInput = (value) => { setState({ manualScanInput: value }); };
        window.submitManualScan = () => {
            const code = state.manualScanInput.trim();
            if (!code) return;
            processPickingScan(code);
            setState({ manualScanInput: '' });
            setTimeout(() => {
                const input = document.getElementById('manual-scan-input');
                if (input) input.focus();
            }, 0);
        };

        function processPickingScan(rawCode) {
            const { matchedItems, matchedBy, normalizedCode } = findMatchingItems(rawCode, state.pickItems || []);

            if (!normalizedCode) {
                return;
            }

            const pickList = state.pickItems || [];

            if (pickList.length === 0) {
                setState({ scanFeedback: { status: 'warning', message: 'Geen picklijst geladen voor deze order.' } });
                return;
            }

            if (matchedItems.length > 0) {
                const updatedSet = new Set(state.pickedItems);
                const newlyPicked = [];
                const alreadyPicked = [];

                matchedItems.forEach((item) => {
                    if (updatedSet.has(item.id)) {
                        alreadyPicked.push(item.id);
                    } else {
                        newlyPicked.push(item.id);
                        updatedSet.add(item.id);
                    }
                });

                const locationContext = matchedBy === 'location'
                    ? `Locatie ${matchedItems[0].location}`
                    : `SKU ${matchedItems.map(i => i.id).join(', ')}`;
                const actionMessage = newlyPicked.length > 0
                    ? `${locationContext}: ${newlyPicked.length} ${newlyPicked.length === 1 ? 'item' : 'items'} toegevoegd aan selectie`
                    : `${locationContext} was al geselecteerd`;

                setState({
                    pickedItems: updatedSet,
                    scanFeedback: {
                        status: 'success',
                        message: actionMessage
                    }
                });
            } else {
                setState({
                    scanFeedback: {
                        status: 'warning',
                        message: `Code ${normalizedCode} hoort niet bij de actieve picklijst. Controleer SKU of locatie en probeer opnieuw.`
                    }
                });
            }
        }

        // --- HANDLERS VOOR MODAL ---
        window.openConfirmationModal = () => {
            if (state.pickedItems.size > 0) {
                setState({ showConfirmationModal: true });
            }
        };

        window.closeConfirmationModal = () => {
            setState({ showConfirmationModal: false });
        };

        window.executePicking = () => {
            const currentLines = state.pickItems || [];
            const itemsToKeep = currentLines.filter(item => !state.pickedItems.has(item.id));
            const count = state.pickedItems.size;

            const totalItems = currentLines.length;
            const remainingItems = Math.max(totalItems - count, 0);
            const newStatus = remainingItems === 0 ? 'completed' : (remainingItems < totalItems ? 'partial' : 'pending');
            const updatedOrder = state.activeOrder ? { ...state.activeOrder, items: remainingItems, totalItems: totalItems, status: newStatus } : null;

            if (updatedOrder) {
                const orderIndex = MOCK_ORDERS.findIndex(o => o.id === updatedOrder.id);

                if (newStatus === 'completed') {
                    if (orderIndex !== -1) {
                        MOCK_ORDERS.splice(orderIndex, 1);
                    }
                    ARCHIVED_ORDERS.push(updatedOrder);
                } else if (orderIndex !== -1) {
                    MOCK_ORDERS[orderIndex] = updatedOrder;
                }
            }

            let updatedOrderLineMap = { ...state.orderLineMap };
            let updatedOrderLineState = { ...state.orderLineState };

            if (updatedOrder?.id) {
                if (newStatus === 'completed') {
                    const { [updatedOrder.id]: _, ...rest } = updatedOrderLineMap;
                    updatedOrderLineMap = rest;
                    const { [updatedOrder.id]: __, ...restState } = updatedOrderLineState;
                    updatedOrderLineState = restState;
                } else {
                    updatedOrderLineMap = { ...updatedOrderLineMap, [updatedOrder.id]: itemsToKeep };
                    updatedOrderLineState = {
                        ...updatedOrderLineState,
                        [updatedOrder.id]: {
                            totalLines: totalItems,
                            remainingLines: remainingItems,
                        },
                    };
                }
            }

            const newPicks = Math.min(60, Math.max(30, state.stats.picksPerHour + (Math.random() > 0.5 ? 1 : -1)));

            setState({
                view: itemsToKeep.length > 0 ? 'picking' : 'dashboard',
                activeOrder: newStatus === 'completed' ? null : updatedOrder,
                pickedItems: new Set(),
                pickItems: itemsToKeep,
                showConfirmationModal: false,
                stats: {
                    ...state.stats,
                    picksPerHour: newPicks,
                    totalPicksShift: state.stats.totalPicksShift + count
                },
                orderLineMap: updatedOrderLineMap,
                orderLineState: updatedOrderLineState,
            });
            // We blijven op de picking pagina als er nog items zijn (Partial Pick), anders terug naar dashboard
            if (itemsToKeep.length === 0) {
                setTimeout(() => alert(`Order ${state.activeOrder?.id || ''} voltooid!`), 100);
            }
        };
        // --- EINDE MODAL HANDLERS ---

        // HANDLERS VOOR DESTINATION WIJZIGEN
        window.toggleEditDestination = () => {
            const isEditing = state.isEditingDestination;
            if (!isEditing) {
                const suggestions = KNOWN_LOCATIONS.slice(0, 6);
                setState({
                    isEditingDestination: true,
                    newDestinationInput: state.activeOrder.destination || '',
                    destinationSuggestions: suggestions,
                    destinationError: null,
                });
            } else {
                setState({ isEditingDestination: false, newDestinationInput: '', destinationSuggestions: [], destinationError: null });
            }
        };

        window.setNewDestinationInput = (value) => {
            const normalized = value.toUpperCase();
            const suggestions = KNOWN_LOCATIONS.filter(loc => loc.includes(normalized)).slice(0, 6);
            setState({ newDestinationInput: normalized, destinationSuggestions: suggestions, destinationError: null });
            setTimeout(() => {
                const input = document.getElementById('destination-input');
                if (input) {
                    input.focus();
                    input.value = state.newDestinationInput;
                    input.setSelectionRange(input.value.length, input.value.length);
                }
            }, 0);
        };

        window.applyDestinationSuggestion = (location) => {
            const suggestions = KNOWN_LOCATIONS.filter(loc => loc.includes(location)).slice(0, 6);
            setState({ newDestinationInput: location, destinationSuggestions: suggestions, destinationError: null });
            setTimeout(() => {
                const input = document.getElementById('destination-input');
                if (input) {
                    input.focus();
                    input.value = state.newDestinationInput;
                    input.setSelectionRange(input.value.length, input.value.length);
                }
            }, 0);
        };

        window.saveDestination = () => {
            const candidate = state.newDestinationInput.trim();
            if (!candidate) {
                setState({ destinationError: 'Voer een locatie in.' });
                return;
            }

            const isKnownLocation = KNOWN_LOCATIONS.includes(candidate);
            if (!isKnownLocation) {
                setState({ destinationError: 'Onbekende locatiecode. Kies een bestaande code of gebruik een suggestie.' });
                return;
            }

            const updatedDestination = candidate;
            const updatedOrder = { ...state.activeOrder, destination: updatedDestination };

            const orderIndex = MOCK_ORDERS.findIndex(o => o.id === updatedOrder.id);
            if (orderIndex !== -1) {
                MOCK_ORDERS[orderIndex] = updatedOrder;
            }

            setState({
                activeOrder: updatedOrder,
                isEditingDestination: false,
                newDestinationInput: '',
                destinationSuggestions: [],
                destinationError: null,
            });
        };
        
        window.resetLoc = () => setState({ scanStep: 1, scannedData: { ...state.scannedData, location: '' } });
        window.confirmAssetLink = () => { setState({ scanStep: 3 }); setTimeout(() => { setState({ scanStep: 0, scannedData: { truck: '', location: '' } }); }, 2500); };

        // --- REAL CAMERA LOGIC ---
        
        window.openScanner = (context = null) => {
            setState({ showScanner: true, scannerContext: context, scannerOverlayFeedback: null, manualScanInput: '' });
            setTimeout(() => {
                const html5QrCode = new Html5Qrcode("reader");
                state.html5QrCode = html5QrCode;
                const config = { fps: 10, qrbox: { width: 220, height: 220 } };
                html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess, onScanFailure)
                .catch(err => {
                    console.error("Camera start failed", err);
                    setState({
                        html5QrCode: null,
                        scannerOverlayFeedback: {
                            status: 'warning',
                            message: 'Camera start niet (pc of permissie). Gebruik handmatige invoer: "typ gescande code".'
                        }
                    });
                });
            }, 100);
        };

        window.closeScanner = () => {
            if (state.html5QrCode) {
                state.html5QrCode.stop().then(() => {
                    state.html5QrCode.clear();
                    setState({ showScanner: false, html5QrCode: null, scannerContext: null, scannerOverlayFeedback: null, manualScanInput: '' });
                }).catch(err => {
                    console.log("Stop failed", err);
                    setState({ showScanner: false, html5QrCode: null, scannerContext: null, scannerOverlayFeedback: null, manualScanInput: '' });
                });
            } else {
                setState({ showScanner: false, scannerContext: null, scannerOverlayFeedback: null, manualScanInput: '' });
            }
        };

        window.submitScannerManualScan = () => {
            const value = (state.manualScanInput || '').trim();
            if (!value) {
                setState({ scannerOverlayFeedback: { status: 'warning', message: 'Voer eerst een code in.' } });
                return;
            }
            handleRealScan(value, state.scannerContext);
        };

        function onScanSuccess(decodedText, decodedResult) {
            if (state.html5QrCode) {
                state.html5QrCode.stop().then(() => {
                    state.html5QrCode.clear();
                    handleRealScan(decodedText);
                });
            }
        }
        
        function onScanFailure(error) {}

        function handleRealScan(result, context = state.scannerContext) {
            setState({ showScanner: false, html5QrCode: null, scannerContext: null, scannerOverlayFeedback: null, manualScanInput: '' });

            if (context === 'asset-truck' || (state.view === 'asset-scan' && state.scanStep === 0 && context !== 'picking')) {
                setState({ scannedData: { ...state.scannedData, truck: result }, scanStep: 1 });
                return;
            }

            if (context === 'asset-location' || (state.view === 'asset-scan' && state.scanStep === 1 && context !== 'picking')) {
                setState({ scannedData: { ...state.scannedData, location: result }, scanStep: 2 });
                return;
            }

            if (context === 'move-serial') {
                setState({ moveSearchInput: result.toUpperCase() });
                setTimeout(() => window.lookupMoveAsset(), 0);
                return;
            }

            if (context === 'move-location') {
                setState({ moveDestinationInput: result.toUpperCase(), moveFeedback: null });
                return;
            }

            if (context === 'receive-serial') {
                window.updateReceiveForm('serial', result);
                return;
            }

            if (context === 'receive-device') {
                window.updateReceiveForm('deviceNumber', result);
                return;
            }

            if (context === 'receive-location') {
                window.updateReceiveForm('location', result);
                return;
            }

            if (state.view === 'picking' || context === 'picking') {
                processPickingScan(result);
            } else if (state.appMode === 'wms-v1' && ['move', 'receive', 'tasks'].includes(state.wmsView)) {
                processWmsScan(result, state.wmsView);
            } else {
                alert(`Gescand: ${result}`);
            }
        }

        // --- SCROLL LOGIC ---
        function attachScrollListener() {
            const container = document.getElementById('scroll-container');
            const header = document.getElementById('dashboard-view'); 
            const headerInner = document.getElementById('dashboard-header');
            
            if (container && header) {
                container.addEventListener('scroll', (e) => {
                    const isScrolled = e.target.scrollTop > 20;
                    if (isScrolled) {
                        header.classList.add('is-scrolled');
                         headerInner.classList.add(state.darkMode ? 'bg-black/40' : 'bg-white/60', 'backdrop-blur-xl', 'border-white/5');
                    } else {
                        header.classList.remove('is-scrolled');
                        headerInner.classList.remove('bg-black/40', 'bg-white/60', 'backdrop-blur-xl', 'border-white/5');
                    }
                });
            }
        }

        function render() {
            const app = document.getElementById('app');
            let html = '';
            switch (state.view) {
                case 'login': html = renderLogin(); break;
                case 'dashboard': html = renderDashboard(); break;
                case 'picking': html = renderPicking(); break;
                case 'asset-scan': html = renderAssetScan(); break;
                case 'wms-v1': html = renderWmsShell(); break;
            }
            html += renderScanner();
            html += renderConfirmationModal(); // Render modal bovenop alles
            app.innerHTML = html;
            syncBodyTheme();
            lucide.createIcons();
            attachScrollListener();
        }

        render();
    </script>
</body>
</html>
