<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Linde Warehouse OS</title>
    
    <!-- 1. Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 2. Lucide Icons (Standalone versie) -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* Custom scrollbar hiding */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Smooth transitions for glass cards */
        .glass-panel { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .glass-panel:active { transform: scale(0.98); }
    </style>
</head>
<body class="bg-[#050505] text-white h-screen w-screen overflow-hidden selection:bg-red-500/30 font-sans transition-colors duration-500" id="body-bg">
    
    <!-- Dynamic Backgrounds -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div id="bg-blob-1" class="absolute -top-[20%] -left-[10%] w-[70%] h-[50%] bg-red-600/20 rounded-full blur-[120px] animate-pulse mix-blend-screen transition-all duration-500"></div>
        <div id="bg-blob-2" class="absolute top-[40%] -right-[10%] w-[60%] h-[60%] bg-blue-600/10 rounded-full blur-[120px] mix-blend-screen transition-all duration-500"></div>
    </div>

    <!-- Main App Container -->
    <div id="app" class="relative z-10 h-full w-full max-w-md mx-auto"></div>

    <!-- 3. Applicatie Logica -->
    <script>
        // --- 1. DATA & STATE (The Single Source of Truth) ---
        
        const MOCK_ORDERS = [
            { id: 'ORD-2025-881', priority: 'high', items: 4, type: 'replenishment', destination: 'WS-PACK-01', status: 'pending' },
            { id: 'ORD-2025-882', priority: 'normal', items: 12, type: 'outbound', destination: 'DOCK-04', status: 'pending' },
            { id: 'ORD-2025-889', priority: 'low', items: 1, type: 'internal', destination: 'LOC-Z-99', status: 'pending' },
        ];

        const MOCK_PICK_ITEMS = [
            { id: 'SKU-9901', name: 'Hydrauliek Pomp V2', qty: 1, location: 'A-12-01', unit: 'st' },
            { id: 'SKU-9902', name: 'Hydrauliek Pomp V2', qty: 1, location: 'A-12-02', unit: 'st' },
            { id: 'SKU-2210', name: 'Linde Remblok Set', qty: 5, location: 'B-04-01', unit: 'doos' },
            { id: 'SKU-8812', name: 'O-Ring 12mm', qty: 100, location: 'Z-01-99', unit: 'zak' },
            { id: 'TRUCK-99', name: 'E20 Chassis', qty: 1, location: 'PARK-01', unit: 'st' },
        ];

        // Initial State
        let state = {
            view: 'login',          // login, dashboard, picking, asset-scan
            user: null,             // { initials: string }
            darkMode: true,
            activeOrder: null,
            pickedItems: new Set(), // Set of IDs
            scanStep: 0,            // 0-3
            scannedData: { truck: '', location: '' },
            isScrolled: false,
            loginInput: '',
            showScanner: false
        };

        // --- 2. STATE MANAGEMENT HELPERS ---

        function setState(updates) {
            state = { ...state, ...updates };
            render(); // The core logic: State change = UI redraw
        }

        // --- 3. UI COMPONENTS (Returning HTML Strings) ---

        // Helper to generate dynamic classes based on theme
        const getTheme = () => ({
            bgMain: state.darkMode ? 'bg-[#050505]' : 'bg-[#f0f4f8]',
            textMain: state.darkMode ? 'text-white' : 'text-slate-900',
            textSec: state.darkMode ? 'text-white/50' : 'text-slate-500',
            glass: state.darkMode 
                ? 'bg-white/10 border-white/20 shadow-[0_8px_32px_0_rgba(0,0,0,0.37)]' 
                : 'bg-white/80 border-slate-200/60 shadow-[0_4px_24px_0_rgba(100,116,139,0.15)]',
            navGlass: state.darkMode ? 'bg-white/5 border-white/10' : 'bg-white/60 border-slate-200/60'
        });

        const GlassCard = (content, onClick = null, extraClasses = '') => {
            const t = getTheme();
            const clickAttr = onClick ? `onclick="${onClick}"` : '';
            const cursor = onClick ? 'cursor-pointer' : '';
            return `
                <div ${clickAttr} class="glass-panel relative overflow-hidden backdrop-blur-xl border rounded-3xl ${t.glass} ${cursor} ${extraClasses}">
                    <div class="absolute inset-0 pointer-events-none bg-gradient-to-br ${state.darkMode ? 'from-white/10' : 'from-white/60'} to-transparent"></div>
                    <div class="relative z-10 w-full h-full p-5">
                        ${content}
                    </div>
                </div>
            `;
        };

        const Button = (label, onClick, variant = 'primary', icon = '', disabled = false) => {
            const variants = {
                primary: "bg-red-600 text-white shadow-lg shadow-red-900/20 border-red-500 hover:bg-red-500",
                secondary: "bg-white/10 text-current border-white/10 hover:bg-white/20",
                success: "bg-emerald-600 text-white shadow-lg shadow-emerald-900/20 border-emerald-500 hover:bg-emerald-500",
            };
            
            const disabledClass = disabled ? 'opacity-50 grayscale pointer-events-none' : '';
            
            return `
                <button onclick="${onClick}" class="w-full py-4 px-6 rounded-2xl font-semibold tracking-wide backdrop-blur-md border flex items-center justify-center gap-3 transition-all active:scale-95 ${variants[variant]} ${disabledClass}">
                    ${icon ? `<i data-lucide="${icon}" width="24" height="24"></i>` : ''}
                    ${label}
                </button>
            `;
        };

        // --- 4. VIEW RENDERERS ---

        function renderLogin() {
            const t = getTheme();
            return `
                <div class="h-full flex flex-col items-center justify-center p-6">
                    <div class="mb-12 relative">
                        <div class="absolute inset-0 bg-red-500 blur-3xl opacity-20 rounded-full animate-pulse"></div>
                        <div class="w-24 h-24 rounded-3xl flex items-center justify-center ${state.darkMode ? 'bg-white/10 border border-white/20' : 'bg-white border border-slate-200 shadow-xl'}">
                            <i data-lucide="truck" class="text-red-600" width="48" height="48"></i>
                        </div>
                    </div>
                    
                    <h1 class="text-3xl font-bold mb-2 ${t.textMain}">Warehouse OS</h1>
                    <p class="text-sm mb-8 ${t.textSec}">Voer uw initialen in om te starten</p>

                    ${GlassCard(`
                        <div class="flex flex-col gap-4">
                            <label class="text-xs uppercase tracking-widest font-bold ${state.darkMode ? 'text-white/60' : 'text-slate-600'}">Operator ID</label>
                            <input 
                                type="text" 
                                value="${state.loginInput}"
                                oninput="handleInput(this.value)"
                                placeholder="AAA"
                                maxlength="3"
                                class="w-full bg-transparent text-center text-5xl font-mono font-bold outline-none border-b-2 py-4 tracking-[0.5em] uppercase placeholder:opacity-20 transition-colors ${state.darkMode ? 'text-white border-white/20 focus:border-red-500' : 'text-slate-900 border-slate-300 focus:border-red-500'}"
                            />
                            ${Button('Start Shift', 'handleLogin()', 'primary', 'arrow-right', state.loginInput.length !== 3)}
                        </div>
                    `)}
                </div>
            `;
        }

        function renderDashboard() {
            const t = getTheme();
            const headerCompact = state.isScrolled;
            
            // Header HTML
            const headerHtml = `
                <div class="flex-none z-20 transition-all duration-500 ease-[cubic-bezier(0.32,0.72,0,1)] ${headerCompact ? (state.darkMode ? 'pb-2 pt-2 border-b border-white/5 bg-black/40 backdrop-blur-xl' : 'pb-2 pt-2 border-b border-slate-200 bg-white/60 backdrop-blur-xl') : 'pb-6 pt-0'}">
                    <div class="flex justify-between items-center transition-all duration-500 ${headerCompact ? 'mb-2' : 'items-end mb-4'}">
                        <div>
                            <h2 class="${state.darkMode ? 'text-white/60' : 'text-slate-600'} text-sm font-medium uppercase tracking-widest transition-all ${headerCompact ? 'text-[10px] opacity-0 h-0 overflow-hidden' : 'opacity-100'}">Ingelogd als</h2>
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 rounded-full flex items-center justify-center font-bold text-xs ${state.darkMode ? 'bg-white text-black' : 'bg-slate-900 text-white'}">
                                    ${state.user?.initials}
                                </div>
                            </div>
                        </div>
                        <div class="flex gap-2">
                             <button onclick="logout()" class="transition-all duration-300 p-3 rounded-full ${state.darkMode ? 'bg-white/5 hover:bg-white/10' : 'bg-white/60 hover:bg-white/80'}">
                                <i data-lucide="log-out" class="text-red-500" width="${headerCompact ? 20 : 24}"></i>
                             </button>
                        </div>
                    </div>

                    <!-- KPI Section -->
                    <div class="transition-all duration-500 w-full ${headerCompact ? 'flex gap-2 h-12' : 'grid grid-cols-2 gap-4 h-32'}">
                         ${GlassCard(`
                            <div class="w-full h-full flex items-center justify-center ${headerCompact ? 'flex-row gap-3 bg-red-500/10 rounded-xl border border-red-500/20' : 'flex-col gap-2'}">
                                ${headerCompact 
                                    ? `<i data-lucide="trending-up" class="${t.textMain}" width="16"></i><span class="${t.textMain} font-bold">42 <span class="text-xs font-normal opacity-60">/u</span></span>`
                                    : `<span class="text-4xl font-bold ${t.textMain}">42</span><span class="text-xs ${t.textSec} uppercase tracking-wider">Picks / Uur</span>`
                                }
                            </div>
                         `, null, headerCompact ? '!bg-transparent !border-0 !p-0 flex-1' : '!p-5')}
                         
                         ${GlassCard(`
                            <div class="w-full h-full flex items-center justify-center ${headerCompact ? 'flex-row gap-3 bg-emerald-500/10 rounded-xl border border-emerald-500/20' : 'flex-col gap-2'}">
                                ${headerCompact 
                                    ? `<i data-lucide="activity" class="text-emerald-500" width="16"></i><span class="text-emerald-500 font-bold">98%</span>`
                                    : `<span class="text-4xl font-bold text-emerald-500">98%</span><span class="text-xs text-emerald-500/50 uppercase tracking-wider">Accuratesse</span>`
                                }
                            </div>
                         `, null, headerCompact ? '!bg-transparent !border-0 !p-0 flex-1' : '!bg-emerald-500/10 !border-emerald-500/20 !p-5')}
                    </div>
                </div>
            `;

            // Orders List HTML
            const ordersHtml = MOCK_ORDERS.map(order => GlassCard(`
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-full flex items-center justify-center ${order.priority === 'high' ? 'bg-red-500/20 text-red-500' : 'bg-blue-500/20 text-blue-500'}">
                        <i data-lucide="package" width="20"></i>
                    </div>
                    <div>
                        <h4 class="${t.textMain} font-bold">${order.id}</h4>
                        <div class="flex items-center gap-2 ${t.textSec} text-sm mt-1">
                            <i data-lucide="arrow-right" width="12"></i>
                            <span class="font-mono bg-white/10 px-1 rounded">${order.destination}</span>
                            <span>•</span>
                            <span>${order.items} regels</span>
                        </div>
                    </div>
                    <div class="ml-auto">
                        <i data-lucide="chevron-right" class="${state.darkMode ? 'text-white/60' : 'text-slate-600'}"></i>
                    </div>
                </div>
            `, `openOrder('${order.id}')`, 'group active:scale-[0.98] cursor-pointer')).join('<div class="h-4"></div>');

            return `
                <div class="h-full flex flex-col p-6 overflow-hidden">
                    ${headerHtml}
                    <div id="scroll-container" class="flex-1 overflow-y-auto pb-24 no-scrollbar relative mt-4">
                        <div class="sticky top-0 z-10 py-4 backdrop-blur-xl transition-colors ${state.darkMode ? 'bg-[#050505]/80' : 'bg-[#f0f4f8]/80'} flex items-center justify-between mb-2">
                            <h3 class="${t.textMain} text-lg font-semibold">Openstaande Orders</h3>
                            <span class="text-xs bg-red-600 text-white px-2 py-1 rounded-full">${MOCK_ORDERS.length} Totaal</span>
                        </div>
                        <div class="space-y-4">
                            ${ordersHtml}
                        </div>
                    </div>
                    ${renderNav()}
                </div>
            `;
        }

        function renderPicking() {
            const t = getTheme();
            if (!state.activeOrder) return '';

            const itemsHtml = MOCK_PICK_ITEMS.map(item => {
                const isSelected = state.pickedItems.has(item.id);
                const borderClass = isSelected 
                    ? (state.darkMode ? 'border-emerald-500/50 bg-emerald-500/10' : 'border-emerald-500 bg-emerald-50')
                    : '';
                const checkBg = isSelected 
                    ? 'bg-emerald-500 text-white border-emerald-500' 
                    : (state.darkMode ? 'bg-white/5 border-white/10' : 'bg-slate-50 border-slate-200');

                return GlassCard(`
                    <div class="flex items-stretch min-h-[5rem] -m-5">
                        <div class="w-16 flex items-center justify-center border-r transition-colors ${checkBg}">
                            <i data-lucide="${isSelected ? 'check-square' : 'square'}" width="24" class="${isSelected ? 'text-white' : (state.darkMode ? 'text-white/60' : 'text-slate-400')}"></i>
                        </div>
                        <div class="flex-1 p-4 flex flex-col justify-center">
                            <div class="flex justify-between items-start">
                                <span class="text-xs font-mono px-2 py-0.5 rounded mb-1 inline-block ${state.darkMode ? 'bg-white/10' : 'bg-slate-200 text-slate-700'}">
                                    ${item.location}
                                </span>
                                <span class="${t.textMain} font-bold text-lg">${item.qty} <span class="text-xs font-normal opacity-60">${item.unit}</span></span>
                            </div>
                            <h4 class="${t.textMain} font-bold leading-tight">${item.name}</h4>
                            <div class="${t.textSec} text-xs font-mono mt-1">${item.id}</div>
                        </div>
                    </div>
                `, `togglePickItem('${item.id}')`, `transition-all duration-200 ${borderClass} !p-0`);
            }).join('<div class="h-3"></div>');

            return `
                 <div class="h-full flex flex-col p-6">
                    <div class="flex items-center gap-4 mb-4 shrink-0">
                        <button onclick="navigate('dashboard')" class="p-3 rounded-full ${state.darkMode ? 'bg-white/10 hover:bg-white/20 text-white' : 'bg-white border border-slate-200 hover:bg-slate-50 text-slate-900'} transition-colors">
                            <i data-lucide="arrow-left" width="24"></i>
                        </button>
                        <div>
                            <h2 class="${state.darkMode ? 'text-white/60' : 'text-slate-600'} text-xs uppercase tracking-widest">Verplaatsen Naar</h2>
                            <h1 class="text-2xl font-mono font-bold text-red-500">${state.activeOrder.destination}</h1>
                        </div>
                    </div>

                    <div class="p-4 rounded-xl mb-4 text-sm ${state.darkMode ? 'bg-blue-500/10 text-blue-200 border border-blue-500/20' : 'bg-blue-50 text-blue-800 border border-blue-200'}">
                        Selecteer items voor verplaatsing.
                    </div>

                    <div class="flex-1 overflow-y-auto space-y-3 pr-1 pb-4 no-scrollbar">
                        ${itemsHtml}
                    </div>

                    <div class="mt-4 pt-4 border-t ${state.darkMode ? 'border-white/10' : 'border-slate-200'}">
                        <div class="flex justify-between items-center mb-4 px-2">
                            <span class="${t.textSec}">Geselecteerd</span>
                            <span class="${t.textMain} font-bold text-xl">${state.pickedItems.size} <span class="text-sm font-normal opacity-50">/ ${MOCK_PICK_ITEMS.length}</span></span>
                        </div>
                        ${Button(
                            state.pickedItems.size > 0 ? `Verplaats ${state.pickedItems.size} Items` : "Selecteer Items",
                            'confirmPicking()',
                            state.pickedItems.size > 0 ? 'success' : 'secondary',
                            'arrow-right',
                            state.pickedItems.size === 0
                        )}
                    </div>
                </div>
            `;
        }

        function renderAssetScan() {
            const t = getTheme();
            const { scanStep, scannedData } = state;

            // Render logic specifically for steps
            let content = '';

            if (scanStep === 3) {
                 // Success
                 content = `
                    <div class="absolute inset-0 z-50 flex flex-col items-center justify-center animate-pulse rounded-3xl border ${state.darkMode ? 'bg-black/80 border-white/10' : 'bg-white/90 border-slate-200'} backdrop-blur-xl">
                        <div class="bg-emerald-500/20 p-6 rounded-full mb-6 border border-emerald-500/50">
                            <i data-lucide="check-circle" class="text-emerald-500" width="48" height="48"></i>
                        </div>
                        <h2 class="text-2xl font-bold ${t.textMain} mb-2">Gekoppeld!</h2>
                        <div class="${t.textSec} text-center max-w-[200px] text-sm">Data succesvol opgeslagen.</div>
                    </div>
                 `;
            } else {
                content = `
                     <div class="flex-1 flex flex-col justify-start pt-4 space-y-6 relative pb-10">
                        <!-- Connector Line -->
                        <div class="absolute left-6 top-6 bottom-12 w-0.5 ${state.darkMode ? 'bg-white/10' : 'bg-slate-200'} -z-10"></div>

                        <!-- Step 1 -->
                        <div class="w-full transition-all duration-500 ${scanStep > 1 ? 'opacity-50' : 'opacity-100'}">
                            <div class="flex gap-4">
                                <div class="w-12 h-12 rounded-full flex items-center justify-center shrink-0 z-10 transition-colors ${scanStep > 0 ? 'bg-emerald-500 text-white shadow-lg' : (state.darkMode ? 'bg-[#050505] border border-white/20' : 'bg-white border border-slate-200')}">
                                    <i data-lucide="${scanStep > 0 ? 'check-circle' : 'truck'}" width="20"></i>
                                </div>
                                ${GlassCard(`
                                    <h3 class="${state.darkMode ? 'text-white/60' : 'text-slate-600'} text-sm uppercase mb-1 font-medium tracking-wider">Stap 1</h3>
                                    <div class="text-xl font-bold ${t.textMain} mb-3">Scan Heftruck ID</div>
                                    ${scannedData.truck 
                                        ? `<div class="bg-emerald-500/10 border border-emerald-500/20 rounded-xl p-3 flex items-center gap-3"><i data-lucide="truck" class="text-emerald-500" width="16"></i><span class="text-emerald-500 font-mono text-lg">${scannedData.truck}</span></div>`
                                        : Button('Scan Chassis', 'openScanner()', 'primary', 'scan')
                                    }
                                `, null, 'flex-1')}
                            </div>
                        </div>

                        <!-- Step 2 -->
                         <div class="w-full transition-all duration-500 ${scanStep === 0 ? 'opacity-30 blur-[1px]' : ''}">
                            <div class="flex gap-4">
                                <div class="w-12 h-12 rounded-full flex items-center justify-center shrink-0 z-10 transition-colors ${scanStep > 1 ? 'bg-emerald-500 text-white shadow-lg' : (state.darkMode ? 'bg-[#050505] border border-white/20' : 'bg-white border border-slate-200')}">
                                    <i data-lucide="${scanStep > 1 ? 'check-circle' : 'map-pin'}" width="20"></i>
                                </div>
                                ${GlassCard(`
                                    <h3 class="${state.darkMode ? 'text-white/60' : 'text-slate-600'} text-sm uppercase mb-1 font-medium tracking-wider">Stap 2</h3>
                                    <div class="text-xl font-bold ${t.textMain} mb-3">Scan Locatie</div>
                                    ${scannedData.location 
                                        ? `<div class="bg-emerald-500/10 border border-emerald-500/20 rounded-xl p-3 flex items-center gap-3"><i data-lucide="map-pin" class="text-emerald-500" width="16"></i><span class="text-emerald-500 font-mono text-lg">${scannedData.location}</span></div>`
                                        : Button('Scan Locatie', scanStep >= 1 ? 'openScanner()' : '', scanStep >= 1 ? 'primary' : 'secondary', 'scan', scanStep === 0)
                                    }
                                `, null, 'flex-1')}
                            </div>
                        </div>

                        <!-- Confirmation -->
                        ${scanStep === 2 ? GlassCard(`
                            <div class="flex items-start gap-4 mb-4">
                                <div class="bg-yellow-500/20 p-3 rounded-full text-yellow-500"><i data-lucide="alert-triangle" width="24"></i></div>
                                <div>
                                    <h3 class="${t.textMain} font-bold text-lg">Bevestig Koppeling</h3>
                                    <p class="${t.textSec} text-sm mt-1">Koppel truck <strong>${scannedData.truck}</strong> aan <strong>${scannedData.location}</strong>?</p>
                                </div>
                            </div>
                            <div class="flex gap-3 mt-4">
                                <button onclick="resetLoc()" class="flex-1 py-3 rounded-xl bg-white/10 text-white">Wijzig</button>
                                <button onclick="confirmAssetLink()" class="flex-1 py-3 rounded-xl bg-emerald-600 text-white shadow-lg shadow-emerald-900/20">Bevestig</button>
                            </div>
                        `, null, 'border-l-4 border-l-yellow-500 animate-pulse') : ''}
                    </div>
                `;
            }

            return `
                 <div class="h-full flex flex-col p-6 overflow-hidden">
                    <div class="flex items-center gap-4 mb-6 shrink-0">
                        <button onclick="navigate('dashboard')" class="p-3 rounded-full ${state.darkMode ? 'bg-white/10 hover:bg-white/20 text-white' : 'bg-white border border-slate-200 hover:bg-slate-50 text-slate-900'} transition-colors">
                            <i data-lucide="arrow-left" width="24"></i>
                        </button>
                        <h1 class="text-xl font-bold ${t.textMain}">Heftruck Lokalisatie</h1>
                    </div>
                    ${content}
                </div>
            `;
        }

        function renderNav() {
            const t = getTheme();
            return GlassCard(`
                <div class="flex justify-around items-center">
                    <button onclick="navigate('dashboard')" class="p-3 rounded-xl transition-colors ${state.view === 'dashboard' ? 'text-red-500 bg-red-500/10' : `${t.textSec} hover:${t.textMain}`}">
                        <i data-lucide="box" width="24"></i>
                    </button>
                    <button onclick="navigate('asset-scan')" class="p-3 rounded-xl transition-colors ${state.view === 'asset-scan' ? 'text-red-500 bg-red-500/10' : `${t.textSec} hover:${t.textMain}`}">
                        <i data-lucide="truck" width="24"></i>
                    </button>
                    <button onclick="toggleTheme()" class="p-3 rounded-xl transition-colors ${state.darkMode ? 'text-yellow-400 hover:bg-white/10' : 'text-slate-600 hover:bg-black/5'}">
                        <i data-lucide="${state.darkMode ? 'sun' : 'moon'}" width="24"></i>
                    </button>
                </div>
            `, null, `mt-4 !p-2 flex-none ${t.navGlass} !rounded-2xl`);
        }

        function renderScanner() {
            if (!state.showScanner) return '';
            return `
                <div class="fixed inset-0 z-50 bg-black/90 backdrop-blur-sm flex flex-col items-center justify-center p-6 animate-[fadeIn_0.2s_ease-out]">
                    <div class="w-full max-w-sm aspect-square border-2 border-white/20 rounded-3xl relative overflow-hidden mb-8">
                        <div class="absolute inset-0 border-[40px] border-black/50"></div>
                        <div class="absolute top-1/2 left-4 right-4 h-0.5 bg-red-500 shadow-[0_0_20px_rgba(239,68,68,0.8)] animate-[ping_1.5s_cubic-bezier(0,0,0.2,1)_infinite]"></div>
                        <div class="absolute bottom-6 left-0 right-0 text-center text-white/70 font-mono text-sm">Richt op barcode</div>
                    </div>
                    <h3 class="text-white text-xl font-bold mb-8">Scannen...</h3>
                    <div class="grid gap-4 w-full max-w-xs">
                        ${Button('Simuleer Scan', 'handleScan()', 'primary')}
                        <button onclick="closeScanner()" class="text-white/50 text-sm py-4">Annuleren</button>
                    </div>
                </div>
            `;
        }

        // --- 5. LOGIC HANDLERS (Global Scope for HTML Onclick) ---

        window.handleInput = (val) => {
            state.loginInput = val.toUpperCase();
            render(); // Re-render to update button disabled state
            // Keep focus (a bit hacky in full re-render, ideally strictly update DOM, but fine for prototype)
            const input = document.querySelector('input');
            if(input) {
                input.focus();
                input.setSelectionRange(input.value.length, input.value.length);
            }
        };

        window.handleLogin = () => {
            if (state.loginInput.length === 3) {
                setState({ user: { initials: state.loginInput }, view: 'dashboard' });
            }
        };

        window.logout = () => setState({ user: null, view: 'login', loginInput: '' });
        
        window.navigate = (view) => setState({ view });
        
        window.toggleTheme = () => {
            setState({ darkMode: !state.darkMode });
            // Update Body Classes immediately
            const body = document.body;
            if (!state.darkMode) {
                body.classList.remove('bg-[#050505]', 'text-white');
                body.classList.add('bg-[#f0f4f8]', 'text-slate-900');
            } else {
                body.classList.add('bg-[#050505]', 'text-white');
                body.classList.remove('bg-[#f0f4f8]', 'text-slate-900');
            }
        };

        window.openOrder = (id) => {
            const order = MOCK_ORDERS.find(o => o.id === id);
            setState({ activeOrder: order, view: 'picking', pickedItems: new Set() });
        };

        window.togglePickItem = (id) => {
            const newSet = new Set(state.pickedItems);
            if (newSet.has(id)) newSet.delete(id);
            else newSet.add(id);
            setState({ pickedItems: newSet });
        };

        window.confirmPicking = () => {
            alert(`${state.pickedItems.size} items verplaatst!`);
            setState({ view: 'dashboard', activeOrder: null });
        };

        window.openScanner = () => setState({ showScanner: true });
        window.closeScanner = () => setState({ showScanner: false });

        window.handleScan = () => {
            // Mock logic
            if (state.view === 'asset-scan') {
                if (state.scanStep === 0) {
                    setState({ showScanner: false, scannedData: { ...state.scannedData, truck: 'LIN-E20-449' }, scanStep: 1 });
                } else if (state.scanStep === 1) {
                    setState({ showScanner: false, scannedData: { ...state.scannedData, location: 'PARK-Z-04' }, scanStep: 2 });
                }
            }
        };

        window.resetLoc = () => setState({ scanStep: 1, scannedData: { ...state.scannedData, location: '' } });

        window.confirmAssetLink = () => {
            setState({ scanStep: 3 });
            setTimeout(() => {
                setState({ scanStep: 0, scannedData: { truck: '', location: '' } });
            }, 2500);
        };

        // Scroll Handler Logic
        function attachScrollListener() {
            const container = document.getElementById('scroll-container');
            if (container) {
                container.addEventListener('scroll', (e) => {
                    const isScrolled = e.target.scrollTop > 20;
                    if (isScrolled !== state.isScrolled) {
                        state.isScrolled = isScrolled;
                        render(); // Trigger re-render for header animation
                        // Restore scroll position after render
                        const newContainer = document.getElementById('scroll-container');
                        if(newContainer) newContainer.scrollTop = e.target.scrollTop; 
                    }
                });
            }
        }

        // --- 6. CORE RENDER LOOP ---

        function render() {
            const app = document.getElementById('app');
            let html = '';

            switch (state.view) {
                case 'login': html = renderLogin(); break;
                case 'dashboard': html = renderDashboard(); break;
                case 'picking': html = renderPicking(); break;
                case 'asset-scan': html = renderAssetScan(); break;
            }

            // Append Scanner Overlay if active
            html += renderScanner();

            app.innerHTML = html;
            
            // Re-initialize Icons
            lucide.createIcons();
            
            // Re-attach listeners that can't be inline
            attachScrollListener();
        }

        // Start App
        render();

    </script>
</body>
</html>
