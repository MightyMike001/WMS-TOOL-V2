<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Linde Warehouse OS</title>
    
    <!-- 1. Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 2. Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- 3. HTML5-QRCode Library -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .glass-panel { transition: all 0.5s cubic-bezier(0.32, 0.72, 0, 1); }
        .glass-panel:active { transform: scale(0.98); }

        /* AANGEPASTE CSS: Header blijft nu zichtbaar */
        .is-scrolled .header-profile { 
            margin-bottom: 0.25rem; 
            padding-top: 0.25rem;
            padding-bottom: 0.25rem;
        }
        
        .is-scrolled .header-logout { transform: scale(0.85); }
        .is-scrolled .header-initials { transform: scale(0.85); }

        /* KPI animaties (nog aanwezig voor eventueel toekomstig gebruik, maar niet actief) */
        .kpi-expanded { opacity: 1; transform: translateY(0); transition: all 0.4s ease; pointer-events: auto; }
        .kpi-compact { opacity: 0; transform: translateY(10px); transition: all 0.4s ease; pointer-events: none; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }

        .is-scrolled .kpi-expanded { opacity: 0; transform: translateY(-10px); pointer-events: none; }
        .is-scrolled .kpi-compact { opacity: 1; transform: translateY(0); pointer-events: auto; }
        
        #reader video { object-fit: cover; width: 100% !important; height: 100% !important; border-radius: 1.5rem; }

        /* Modal animatie */
        .modal-enter { opacity: 0; transform: scale(0.95); }
        .modal-enter-active { opacity: 1; transform: scale(1); transition: all 0.3s ease-out; }
    </style>
</head>
<body class="bg-[#050505] text-white h-screen w-screen overflow-hidden selection:bg-red-500/30 font-sans transition-colors duration-500" id="body-bg">
    
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div id="bg-blob-1" class="absolute -top-[20%] -left-[10%] w-[70%] h-[50%] bg-red-600/20 rounded-full blur-[120px] animate-pulse mix-blend-screen transition-all duration-500"></div>
        <div id="bg-blob-2" class="absolute top-[40%] -right-[10%] w-[60%] h-[60%] bg-blue-600/10 rounded-full blur-[120px] mix-blend-screen transition-all duration-500"></div>
    </div>

    <div id="app" class="relative z-10 h-full w-full max-w-md mx-auto"></div>

    <script>
        // --- 1. DATA & STATE ---
        // Let op: In een echte app zouden MOCK_ORDERS en MOCK_PICK_ITEMS uit een database komen.
        // We verwijderen hier items direct uit de MOCK_PICK_ITEMS array om de 'rest' te simuleren.
        let MOCK_ORDERS = [
            { id: 'ORD-2025-881', priority: 'high', createdAt: '2025-02-15T07:45:00Z', items: 4, totalItems: 4, type: 'replenishment', destination: 'WS-PACK-01', status: 'pending' },
            { id: 'ORD-2025-882', priority: 'normal', createdAt: '2025-02-16T09:10:00Z', items: 12, totalItems: 12, type: 'outbound', destination: 'DOCK-04', status: 'pending' },
            { id: 'ORD-2025-889', priority: 'low', createdAt: '2025-02-14T14:20:00Z', items: 1, totalItems: 1, type: 'internal', destination: 'LOC-Z-99', status: 'pending' },
            { id: 'ORD-2025-890', priority: 'normal', createdAt: '2025-02-16T11:05:00Z', items: 8, totalItems: 8, destination: 'A-14-02', status: 'pending' },
            { id: 'ORD-2025-891', priority: 'low', createdAt: '2025-02-16T06:35:00Z', items: 2, totalItems: 2, destination: 'B-02-11', status: 'pending' },
            { id: 'ORD-2025-892', priority: 'normal', createdAt: '2025-02-15T17:30:00Z', items: 5, totalItems: 5, destination: 'C-12-01', status: 'pending' },
            { id: 'ORD-2025-893', priority: 'low', createdAt: '2025-02-13T08:00:00Z', items: 1, totalItems: 1, destination: 'A-01-01', status: 'pending' },
            { id: 'ORD-2025-894', priority: 'high', createdAt: '2025-02-16T05:50:00Z', items: 3, totalItems: 3, destination: 'B-11-05', status: 'pending' },
        ];

        let ARCHIVED_ORDERS = [];

        let MOCK_PICK_ITEMS = [
            { id: 'SKU-9901', name: 'Hydrauliek Pomp V2', qty: 1, location: 'A-12-01', unit: 'st' },
            { id: 'SKU-9902', name: 'Hydrauliek Pomp V2', qty: 1, location: 'A-12-02', unit: 'st' },
            { id: 'SKU-2210', name: 'Linde Remblok Set', qty: 5, location: 'B-04-01', unit: 'doos' },
            { id: 'SKU-8812', name: 'O-Ring 12mm', qty: 100, location: 'Z-01-99', unit: 'zak' },
            { id: 'TRUCK-99', name: 'E20 Chassis', qty: 1, location: 'PARK-01', unit: 'st' },
        ];

        let state = {
            view: 'login',
            user: null,
            darkMode: true,
            activeOrder: null,
            pickedItems: new Set(),
            scanStep: 0,
            scannedData: { truck: '', location: '' },
            scannerContext: null,
            manualScanInput: '',
            scanFeedback: null,
            loginInput: '',
            showScanner: false,
            html5QrCode: null,
            sortOption: 'priority',
            stats: {
                picksPerHour: 38,
                accuracy: 99.2,
                totalPicksShift: 142
            },
            isEditingDestination: false,
            newDestinationInput: '',
            showConfirmationModal: false // NIEUW: Voor de pick bevestiging
        };

        // --- 2. STATE MANAGEMENT ---
        function setState(updates) {
            state = { ...state, ...updates };
            render(); 
        }

        // --- 3. UI COMPONENTS ---
        const getTheme = () => ({
            bgMain: state.darkMode ? 'bg-[#050505]' : 'bg-[#f0f4f8]',
            textMain: state.darkMode ? 'text-white' : 'text-slate-900',
            textSec: state.darkMode ? 'text-white/50' : 'text-slate-500',
            glass: state.darkMode 
                ? 'bg-white/10 border-white/20 shadow-[0_8px_32px_0_rgba(0,0,0,0.37)]' 
                : 'bg-white/80 border-slate-200/60 shadow-[0_4px_24px_0_rgba(100,116,139,0.15)]',
            navGlass: state.darkMode ? 'bg-white/5 border-white/10' : 'bg-white/60 border-slate-200/60'
        });

        const GlassCard = (content, onClick = null, extraClasses = '') => {
            const t = getTheme();
            const clickAttr = onClick ? `onclick="${onClick}"` : '';
            const cursor = onClick ? 'cursor-pointer' : '';
            return `
                <div ${clickAttr} class="glass-panel relative overflow-hidden backdrop-blur-xl border rounded-2xl ${t.glass} ${cursor} ${extraClasses}">
                    <div class="absolute inset-0 pointer-events-none bg-gradient-to-br ${state.darkMode ? 'from-white/10' : 'from-white/60'} to-transparent"></div>
                    <div class="relative z-10 w-full h-full p-3"> <!-- Padding verlaagd van p-5 naar p-3 -->
                        ${content}
                    </div>
                </div>
            `;
        };

        const priorityStyles = {
            high: { label: 'Urgent', chip: 'bg-red-500/15 text-red-200 border border-red-500/30', icon: 'bg-red-500/20 text-red-500' },
            normal: { label: 'Standaard', chip: 'bg-blue-500/15 text-blue-200 border border-blue-500/30', icon: 'bg-blue-500/20 text-blue-500' },
            low: { label: 'Laag', chip: 'bg-amber-500/15 text-amber-200 border border-amber-500/30', icon: 'bg-amber-500/20 text-amber-500' },
        };

        const statusStyles = {
            pending: { label: 'Open', chip: 'bg-white/10 text-white/80 border border-white/20' },
            partial: { label: 'Gedeeltelijk', chip: 'bg-yellow-500/15 text-yellow-200 border border-yellow-500/30' },
            completed: { label: 'Voltooid', chip: 'bg-emerald-500/15 text-emerald-200 border border-emerald-500/30' },
        };

        const priorityRank = { high: 0, normal: 1, low: 2 };

        const sortOrders = (orders) => {
            const sorted = [...orders];
            sorted.sort((a, b) => {
                if (state.sortOption === 'destination') {
                    const destA = (a.destination || '').localeCompare(b.destination || '');
                    return destA;
                }
                if (state.sortOption === 'createdAt') {
                    return new Date(b.createdAt).getTime() - new Date(a.createdAt).getTime();
                }
                return (priorityRank[a.priority] ?? 99) - (priorityRank[b.priority] ?? 99);
            });
            return sorted;
        };

        const getOrderLineCounts = () => {
            const totalLines = MOCK_PICK_ITEMS.length;
            const pickedCount = state.pickedItems?.size || 0;
            const remainingLines = Math.max(totalLines - pickedCount, 0);

            return { remainingLines, totalLines };
        };

        const Button = (label, onClick, variant = 'primary', icon = '', disabled = false) => {
            const variants = {
                primary: "bg-red-600 text-white shadow-lg shadow-red-900/20 border-red-500 hover:bg-red-500",
                secondary: "bg-white/10 text-current border-white/10 hover:bg-white/20",
                success: "bg-emerald-600 text-white shadow-lg shadow-emerald-900/20 border-emerald-500 hover:bg-emerald-500",
            };
            const disabledClass = disabled ? 'opacity-50 grayscale pointer-events-none' : '';
            return `
                <button onclick="${onClick}" class="w-full py-3 px-4 rounded-xl font-semibold tracking-wide backdrop-blur-md border flex items-center justify-center gap-2 transition-all active:scale-95 ${variants[variant]} ${disabledClass}">
                    ${icon ? `<i data-lucide="${icon}" width="20" height="20"></i>` : ''}
                    ${label}
                </button>
            `;
        };

        // --- 4. VIEW RENDERERS ---

        function renderLogin() {
            const t = getTheme();
            return `
                <div class="h-full flex flex-col items-center justify-center p-6">
                    <div class="mb-8 relative">
                        <div class="absolute inset-0 bg-red-500 blur-3xl opacity-20 rounded-full animate-pulse"></div>
                        <div class="w-20 h-20 rounded-2xl flex items-center justify-center ${state.darkMode ? 'bg-white/10 border border-white/20' : 'bg-white border border-slate-200 shadow-xl'}">
                            <i data-lucide="truck" class="text-red-600" width="40" height="40"></i>
                        </div>
                    </div>
                    <h1 class="text-2xl font-bold mb-2 ${t.textMain}">Warehouse OS</h1>
                    <p class="text-sm mb-6 ${t.textSec}">Voer uw initialen in om te starten</p>
                    ${GlassCard(`
                        <div class="flex flex-col gap-3">
                            <label class="text-xs uppercase tracking-widest font-bold ${state.darkMode ? 'text-white/60' : 'text-slate-600'}">Operator ID</label>
                            <input type="text" value="${state.loginInput}" oninput="handleInput(this.value)" placeholder="AAA" maxlength="3"
                                class="w-full bg-transparent text-center text-4xl font-mono font-bold outline-none border-b-2 py-3 tracking-[0.5em] uppercase placeholder:opacity-20 transition-colors ${state.darkMode ? 'text-white border-white/20 focus:border-red-500' : 'text-slate-900 border-slate-300 focus:border-red-500'}"
                            />
                            ${Button('Start Shift', 'handleLogin()', 'primary', 'arrow-right', state.loginInput.length !== 3)}
                        </div>
                    `)}
                </div>
            `;
        }

        function renderDashboard() {
            const t = getTheme();
            const lineCounts = getOrderLineCounts();
            const sortedOrders = sortOrders(MOCK_ORDERS);
            const sortLabels = {
                priority: 'Urgentie',
                destination: 'Bestemming',
                createdAt: 'Aanmaakdatum'
            };
            return `
                <div id="dashboard-view" class="h-full flex flex-col px-4 pt-4 pb-2 overflow-hidden transition-all duration-500">
                    <div id="dashboard-header" class="flex-none z-20 transition-all duration-500 ease-[cubic-bezier(0.32,0.72,0,1)] pb-2 pt-0 border-b border-transparent">

                        <!-- Header met Initialen (Links) en Logout (Rechts) -->
                        <div class="header-profile flex justify-between items-center mb-2 transition-all duration-500">
                            
                            <!-- Initialen (LINKSBOVEN) -->
                            <div class="header-initials transition-all duration-300">
                                <div class="w-10 h-10 rounded-full flex items-center justify-center font-bold text-sm ${state.darkMode ? 'bg-white text-black' : 'bg-slate-900 text-white'} shadow-lg">
                                    ${state.user?.initials}
                                </div>
                            </div>

                            <!-- Logout -->
                            <div class="header-logout transition-all duration-300">
                                <button onclick="logout()" class="p-2 rounded-full ${state.darkMode ? 'bg-white/5 hover:bg-white/10' : 'bg-white/60 hover:bg-white/80'}">
                                    <i data-lucide="log-out" class="text-red-500" width="20"></i>
                                </button>
                            </div>
                        </div>
                        
                    </div>

                    <div id="scroll-container" class="flex-1 overflow-y-auto pb-16 no-scrollbar relative mt-1">
                        <!-- Sticky header nog compacter -->
                        <div class="sticky top-0 z-10 py-2 backdrop-blur-xl transition-colors ${state.darkMode ? 'bg-[#050505]/80' : 'bg-[#f0f4f8]/80'} flex items-center justify-between gap-3 mb-2">
                            <div>
                                <h3 class="${t.textMain} text-base font-semibold">Openstaande Orders</h3>
                                <p class="${t.textSec} text-[11px] leading-tight">Gesorteerd op <span class="font-semibold">${sortLabels[state.sortOption]}</span></p>
                            </div>
                            <div class="flex items-center gap-2">
                                <div class="flex items-center gap-1 bg-white/5 border border-white/10 rounded-xl p-1 ${state.darkMode ? '' : 'bg-white/70 border-slate-200'}">
                                    ${['priority','destination','createdAt'].map(option => `
                                        <button onclick="setSortOption('${option}')" class="text-[11px] px-2 py-1 rounded-lg font-semibold flex items-center gap-1 transition-all ${state.sortOption === option
                                            ? 'bg-red-600 text-white shadow-lg shadow-red-900/20'
                                            : `${t.textSec} hover:${state.darkMode ? 'bg-white/10' : 'bg-white/70'}`}">
                                            <i data-lucide="${option === 'priority' ? 'flame' : option === 'destination' ? 'map-pin' : 'clock'}" width="12"></i>
                                            <span class="capitalize">${option === 'createdAt' ? 'datum' : option}</span>
                                        </button>
                                    `).join('')}
                                </div>
                                <span class="text-[10px] font-bold bg-red-600 text-white px-2 py-0.5 rounded-full">${MOCK_ORDERS.length} Totaal</span>
                            </div>
                        </div>
                        <!-- Space-y-2 i.p.v. space-y-4 voor dichtere lijst -->
                        <div class="space-y-2">
                            ${sortedOrders.map(order => GlassCard(`
                                <div class="flex items-center gap-3">
                                    <!-- Kleiner icoon container w-10 h-10 -->
                                    <div class="w-10 h-10 rounded-full flex items-center justify-center shrink-0 ${priorityStyles[order.priority]?.icon || 'bg-blue-500/20 text-blue-500'}">
                                        <i data-lucide="package" width="18"></i>
                                    </div>
                                    <div class="min-w-0 flex-1">
                                        <div class="flex items-center gap-2 mb-1">
                                            <h4 class="${t.textMain} font-bold text-sm truncate">${order.id}</h4>
                                            <span class="text-[10px] uppercase tracking-widest px-2 py-1 rounded-full font-bold ${priorityStyles[order.priority]?.chip}">${priorityStyles[order.priority]?.label || 'N.v.t.'}</span>
                                            <span class="text-[10px] uppercase tracking-widest px-2 py-1 rounded-full font-bold ${statusStyles[order.status]?.chip || 'bg-white/10 text-white/80 border border-white/20'}">${statusStyles[order.status]?.label || 'Open'}</span>
                                        </div>
                                        <div class="flex items-center gap-2 ${t.textSec} text-xs mt-0.5 flex-wrap">
                                            <div class="flex items-center gap-1">
                                                <i data-lucide="map-pin" width="12"></i>
                                                <span class="font-mono bg-white/10 px-1 rounded truncate">${order.destination || 'GEEN LOC'}</span>
                                            </div>
                                            <span class="hidden sm:inline">•</span>
                                            <span class="whitespace-nowrap flex items-center gap-1"><i data-lucide="clock" width="12"></i>${new Date(order.createdAt).toLocaleString('nl-NL', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' })}</span>
                                            <span class="hidden sm:inline">•</span>
                                            <span class="whitespace-nowrap flex items-center gap-1"><i data-lucide="list" width="12"></i>Nog ${lineCounts.remainingLines} / ${lineCounts.totalLines} regels</span>
                                        </div>
                                    </div>
                                    <div class="ml-auto shrink-0">
                                        <i data-lucide="chevron-right" class="${state.darkMode ? 'text-white/60' : 'text-slate-600'}" width="16"></i>
                                    </div>
                                </div>
                            `, `openOrder('${order.id}')`, 'group active:scale-[0.98] cursor-pointer')).join('<div class="h-2"></div>')} 
                            <!-- Tussenruimte h-2 i.p.v. h-4 -->
                        </div>
                    </div>
                    ${renderNav()}
                </div>
            `;
        }

        function renderPicking() {
            const t = getTheme();
            if (!state.activeOrder) return '';
            
            // --- LOGICA VOOR DESTINATION WIJZIGEN ---
            const destinationBlock = state.isEditingDestination ? `
                <div class="flex flex-col gap-2 w-full">
                    <input id="destination-input" type="text" value="${state.newDestinationInput || state.activeOrder.destination || ''}" oninput="setNewDestinationInput(this.value)"
                        class="bg-white/10 text-white p-2 rounded-lg font-mono text-xl outline-none focus:ring-2 focus:ring-red-500 transition-all uppercase"
                    />
                    <div class="flex gap-2">
                        ${Button('Opslaan', 'saveDestination()', 'success', 'save', state.newDestinationInput.length < 1)}
                        ${Button('Annuleren', 'toggleEditDestination()', 'secondary', 'x', false)}
                    </div>
                </div>
            ` : `
                <div onclick="toggleEditDestination()" class="flex items-center gap-2 cursor-pointer group w-full">
                    <h1 class="text-xl font-mono font-bold text-red-500">${state.activeOrder.destination || 'GEEN LOCATIE'}</h1>
                    <i data-lucide="edit" width="16" class="text-red-500/70 group-hover:text-red-500 transition-colors shrink-0"></i>
                </div>
            `;
            // --- EINDE LOGICA ---


            const itemsHtml = MOCK_PICK_ITEMS.map(item => {
                const isSelected = state.pickedItems.has(item.id);
                const borderClass = isSelected 
                    ? (state.darkMode ? 'border-emerald-500/50 bg-emerald-500/10' : 'border-emerald-500 bg-emerald-50')
                    : '';
                const checkBg = isSelected 
                    ? 'bg-emerald-500 text-white border-emerald-500' 
                    : (state.darkMode ? 'bg-white/5 border-white/10' : 'bg-slate-50 border-slate-200');

                // Padding verlaagd en margins aangepast voor compactere lijst
                return GlassCard(`
                    <div class="flex items-stretch min-h-[4rem] -m-3">
                        <div class="w-12 flex items-center justify-center border-r transition-colors ${checkBg}">
                            <i data-lucide="${isSelected ? 'check-square' : 'square'}" width="20" class="${isSelected ? 'text-white' : (state.darkMode ? 'text-white/60' : 'text-slate-400')}"></i>
                        </div>
                        <div class="flex-1 p-3 flex flex-col justify-center">
                            <div class="flex justify-between items-start">
                                <span class="text-[10px] font-mono px-1.5 py-0.5 rounded mb-0.5 inline-block ${state.darkMode ? 'bg-white/10' : 'bg-slate-200 text-slate-700'}">
                                    ${item.location}
                                </span>
                                <span class="${t.textMain} font-bold text-base">${item.qty} <span class="text-[10px] font-normal opacity-60">${item.unit}</span></span>
                            </div>
                            <h4 class="${t.textMain} font-bold text-sm leading-tight truncate">${item.name}</h4>
                            <div class="${t.textSec} text-[10px] font-mono mt-0.5">${item.id}</div>
                        </div>
                    </div>
                `, `togglePickItem('${item.id}')`, `transition-all duration-200 ${borderClass} !p-0`);
            }).join('<div class="h-2"></div>');

            return `
                 <div class="h-full flex flex-col px-4 pt-4 pb-2">
                    <div class="flex items-start gap-3 mb-3 shrink-0">
                        <button onclick="navigate('dashboard')" class="p-2 rounded-full ${state.darkMode ? 'bg-white/10 hover:bg-white/20 text-white' : 'bg-white border border-slate-200 hover:bg-slate-50 text-slate-900'} transition-colors">
                            <i data-lucide="arrow-left" width="20"></i>
                        </button>
                        <div class="flex-1 min-w-0">
                            <h2 class="${state.darkMode ? 'text-white/60' : 'text-slate-600'} text-[10px] uppercase tracking-widest">Verplaatsen Naar</h2>
                            ${destinationBlock}
                        </div>
                    </div>
                    ${GlassCard(`
                        <div class="flex flex-col gap-3">
                            <div class="flex items-center justify-between gap-3">
                                <div class="flex-1">
                                    <p class="${t.textSec} text-[10px] uppercase tracking-[0.2em] font-semibold mb-2">Barcode / QR-scan</p>
                                    <div class="flex gap-2 items-center">
                                        <input id="manual-scan-input" type="text" value="${state.manualScanInput}" oninput="setManualScanInput(this.value)" onkeydown="if(event.key==='Enter'){submitManualScan();}" placeholder="Scan of typ code" class="flex-1 bg-transparent border rounded-xl px-3 py-2 text-sm ${state.darkMode ? 'border-white/20 text-white placeholder:text-white/30 focus:border-red-500' : 'border-slate-200 text-slate-900 placeholder:text-slate-400 focus:border-red-500'} outline-none" />
                                        <button onclick="submitManualScan()" class="px-4 py-2 rounded-xl text-sm font-semibold ${state.darkMode ? 'bg-red-600 text-white hover:bg-red-500' : 'bg-red-600 text-white hover:bg-red-500'} transition-colors">Bevestig</button>
                                    </div>
                                </div>
                                <button onclick="openScanner('picking')" class="p-3 rounded-xl border ${state.darkMode ? 'border-white/10 bg-white/5 text-white hover:bg-white/10' : 'border-slate-200 bg-white text-slate-900 hover:bg-slate-50'} transition-colors shrink-0">
                                    <i data-lucide="camera" width="18"></i>
                                </button>
                            </div>
                            ${state.scanFeedback ? `<div class="text-xs px-3 py-2 rounded-lg border ${state.scanFeedback.status === 'success' ? 'bg-emerald-500/10 border-emerald-500/30 text-emerald-200' : 'bg-amber-500/10 border-amber-500/30 text-amber-200'}">${state.scanFeedback.message}</div>` : ''}
                        </div>
                    `, null, 'mb-3')}
                    <div class="p-3 rounded-xl mb-3 text-xs ${state.darkMode ? 'bg-blue-500/10 text-blue-200 border border-blue-500/20' : 'bg-blue-50 text-blue-800 border border-blue-200'}">Selecteer items.</div>
                    <div class="flex-1 overflow-y-auto space-y-2 pr-1 pb-4 no-scrollbar">${itemsHtml}</div>
                    <div class="mt-2 pt-2 border-t ${state.darkMode ? 'border-white/10' : 'border-slate-200'}">
                        <div class="flex justify-between items-center mb-2 px-1">
                            <span class="${t.textSec} text-xs">Geselecteerd</span>
                            <span class="${t.textMain} font-bold text-lg">${state.pickedItems.size} <span class="text-xs font-normal opacity-50">/ ${MOCK_PICK_ITEMS.length}</span></span>
                        </div>
                        ${Button(state.pickedItems.size > 0 ? `Verplaats ${state.pickedItems.size} Items` : "Selecteer Items", 'openConfirmationModal()', state.pickedItems.size > 0 ? 'success' : 'secondary', 'arrow-right', state.pickedItems.size === 0)}
                    </div>
                    ${renderNav()}
                </div>
            `;
        }

        function renderAssetScan() {
            const t = getTheme();
            const { scanStep, scannedData } = state;
            let content = '';

            if (scanStep === 3) {
                 content = `
                    <div class="absolute inset-0 z-50 flex flex-col items-center justify-center animate-pulse rounded-3xl border ${state.darkMode ? 'bg-black/80 border-white/10' : 'bg-white/90 border-slate-200'} backdrop-blur-xl">
                        <div class="bg-emerald-500/20 p-5 rounded-full mb-4 border border-emerald-500/50">
                            <i data-lucide="check-circle" class="text-emerald-500" width="40" height="40"></i>
                        </div>
                        <h2 class="text-xl font-bold ${t.textMain} mb-1">Gekoppeld!</h2>
                        <div class="${t.textSec} text-center max-w-[200px] text-xs">Data succesvol opgeslagen.</div>
                    </div>
                 `;
            } else {
                content = `
                     <div class="flex-1 flex flex-col justify-start pt-2 space-y-4 relative pb-10">
                        <div class="absolute left-6 top-6 bottom-12 w-0.5 ${state.darkMode ? 'bg-white/10' : 'bg-slate-200'} -z-10"></div>
                        <!-- Step 1 -->
                        <div class="w-full transition-all duration-500 ${scanStep > 1 ? 'opacity-50' : 'opacity-100'}">
                            <div class="flex gap-3">
                                <div class="w-10 h-10 rounded-full flex items-center justify-center shrink-0 z-10 transition-colors ${scanStep > 0 ? 'bg-emerald-500 text-white shadow-lg' : (state.darkMode ? 'bg-[#050505] border border-white/20' : 'bg-white border border-slate-200')}">
                                    <i data-lucide="${scanStep > 0 ? 'check-circle' : 'truck'}" width="18"></i>
                                </div>
                                ${GlassCard(`
                                    <h3 class="${state.darkMode ? 'text-white/60' : 'text-slate-600'} text-xs uppercase mb-0.5 font-medium tracking-wider">Stap 1</h3>
                                    <div class="text-lg font-bold ${t.textMain} mb-2">Scan Heftruck ID</div>
                                    ${scannedData.truck ? `<div class="bg-emerald-500/10 border border-emerald-500/20 rounded-xl p-2 flex items-center gap-2"><i data-lucide="truck" class="text-emerald-500" width="16"></i><span class="text-emerald-500 font-mono text-base">${scannedData.truck}</span></div>` : Button('Start Camera', 'openScanner()', 'primary', 'camera')}
                                `, null, 'flex-1')}
                            </div>
                        </div>
                        <!-- Step 2 -->
                         <div class="w-full transition-all duration-500 ${scanStep === 0 ? 'opacity-30 blur-[1px]' : ''}">
                            <div class="flex gap-3">
                                <div class="w-10 h-10 rounded-full flex items-center justify-center shrink-0 z-10 transition-colors ${scanStep > 1 ? 'bg-emerald-500 text-white shadow-lg' : (state.darkMode ? 'bg-[#050505] border border-white/20' : 'bg-white border border-slate-200')}">
                                    <i data-lucide="${scanStep > 1 ? 'check-circle' : 'map-pin'}" width="18"></i>
                                </div>
                                ${GlassCard(`
                                    <h3 class="${state.darkMode ? 'text-white/60' : 'text-slate-600'} text-xs uppercase mb-0.5 font-medium tracking-wider">Stap 2</h3>
                                    <div class="text-lg font-bold ${t.textMain} mb-2">Scan Locatie</div>
                                    ${scannedData.location ? `<div class="bg-emerald-500/10 border border-emerald-500/20 rounded-xl p-2 flex items-center gap-2"><i data-lucide="map-pin" class="text-emerald-500" width="16"></i><span class="text-emerald-500 font-mono text-base">${scannedData.location}</span></div>` : Button('Start Camera', scanStep >= 1 ? 'openScanner()' : '', scanStep >= 1 ? 'primary' : 'secondary', 'camera', scanStep === 0)}
                                `, null, 'flex-1')}
                            </div>
                        </div>
                        ${scanStep === 2 ? GlassCard(`
                            <div class="flex items-start gap-3 mb-3">
                                <div class="bg-yellow-500/20 p-2 rounded-full text-yellow-500"><i data-lucide="alert-triangle" width="20"></i></div>
                                <div><h3 class="${t.textMain} font-bold text-base">Bevestig</h3><p class="${t.textSec} text-xs mt-0.5">Koppel truck <strong>${scannedData.truck}</strong> aan <strong>${scannedData.location}</strong>?</p></div>
                            </div>
                            <div class="flex gap-3 mt-3"><button onclick="resetLoc()" class="flex-1 py-2 rounded-xl bg-white/10 text-white text-sm">Wijzig</button><button onclick="confirmAssetLink()" class="flex-1 py-2 rounded-xl bg-emerald-600 text-white shadow-lg text-sm">Bevestig</button></div>
                        `, null, 'border-l-4 border-l-yellow-500 animate-pulse') : ''}
                    </div>
                `;
            }

            return `
                 <div class="h-full flex flex-col px-4 pt-4 pb-2 overflow-hidden">
                    <div class="flex items-center gap-3 mb-4 shrink-0">
                        <button onclick="navigate('dashboard')" class="p-2 rounded-full ${state.darkMode ? 'bg-white/10 hover:bg-white/20 text-white' : 'bg-white border border-slate-200 hover:bg-slate-50 text-slate-900'} transition-colors"><i data-lucide="arrow-left" width="20"></i></button>
                        <h1 class="text-lg font-bold ${t.textMain}">Heftruck Lokalisatie</h1>
                    </div>
                    ${content}
                </div>
            `;
        }

        function renderNav() {
            const t = getTheme();
            return GlassCard(`
                <div class="flex justify-around items-center">
                    <button onclick="navigate('dashboard')" class="p-2 rounded-xl transition-colors ${state.view === 'dashboard' ? 'text-red-500 bg-red-500/10' : `${t.textSec} hover:${t.textMain}`}">
                        <i data-lucide="box" width="20"></i>
                    </button>
                    <button onclick="navigate('asset-scan')" class="p-2 rounded-xl transition-colors ${state.view === 'asset-scan' ? 'text-red-500 bg-red-500/10' : `${t.textSec} hover:${t.textMain}`}">
                        <i data-lucide="truck" width="20"></i>
                    </button>
                    <button onclick="toggleTheme()" class="p-2 rounded-xl transition-colors ${state.darkMode ? 'text-yellow-400 hover:bg-white/10' : 'text-slate-600 hover:bg-black/5'}">
                        <i data-lucide="${state.darkMode ? 'sun' : 'moon'}" width="20"></i>
                    </button>
                </div>
            `, null, `mt-0 !p-1.5 flex-none ${t.navGlass} !rounded-xl`);
        }

        function renderScanner() {
            if (!state.showScanner) return '';
            return `
                <div class="fixed inset-0 z-50 bg-black flex flex-col items-center justify-center p-0 animate-[fadeIn_0.2s_ease-out]">
                    <div class="relative w-full h-full flex flex-col">
                        <div id="reader" class="w-full h-full bg-black object-cover"></div>
                        <div class="absolute inset-0 pointer-events-none flex flex-col items-center justify-center">
                             <div class="w-64 h-64 border-2 border-white/40 rounded-3xl relative">
                                <div class="absolute inset-0 border-[40px] border-black/40 rounded-3xl"></div>
                                <div class="absolute top-1/2 left-4 right-4 h-0.5 bg-red-500 shadow-[0_0_20px_rgba(239,68,68,0.8)] animate-[ping_1.5s_cubic-bezier(0,0,0.2,1)_infinite]"></div>
                             </div>
                             <div class="mt-8 bg-black/60 px-4 py-2 rounded-full backdrop-blur-md text-white font-mono text-sm">Richt op barcode</div>
                        </div>
                        <div class="absolute bottom-10 left-0 right-0 flex justify-center pointer-events-auto">
                            <button onclick="closeScanner()" class="bg-white/20 backdrop-blur-md border border-white/20 text-white px-8 py-4 rounded-full font-bold shadow-lg active:scale-95 transition-transform">
                                Annuleren
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }
        
        // NIEUW: CONFIRMATION MODAL
        function renderConfirmationModal() {
            if (!state.showConfirmationModal || state.pickedItems.size === 0) return '';
            
            const t = getTheme();
            const pickedCount = state.pickedItems.size;
            const remainingCount = MOCK_PICK_ITEMS.length - pickedCount;

            return `
                <div id="confirmation-modal" class="fixed inset-0 z-50 flex items-center justify-center p-6 bg-black/50 backdrop-blur-sm modal-enter modal-enter-active">
                    ${GlassCard(`
                        <div class="flex flex-col gap-4">
                            <h3 class="${t.textMain} text-xl font-bold">Bevestig Verplaatsing</h3>
                            
                            <p class="${t.textSec} text-sm">U staat op het punt **${pickedCount}** items te verplaatsen naar **${state.activeOrder.destination}**.</p>
                            
                            <ul class="space-y-1 ${t.textSec} text-sm">
                                <li class="font-bold text-emerald-500 flex items-center gap-2"><i data-lucide="check-circle" width="16"></i> ${pickedCount} item(s) voltooid.</li>
                                <li class="text-red-400 flex items-center gap-2"><i data-lucide="alert-triangle" width="16"></i> ${remainingCount} item(s) blijven over.</li>
                            </ul>

                            <div class="flex gap-3 mt-2">
                                ${Button('Annuleren', 'closeConfirmationModal()', 'secondary', 'x', false)}
                                ${Button('Bevestig & Verplaats', 'executePicking()', 'success', 'arrow-right')}
                            </div>
                        </div>
                    `, null, 'p-6 !rounded-xl w-full max-w-sm')}
                </div>
            `;
        }

        // --- 5. HANDLERS ---
        window.handleInput = (val) => { state.loginInput = val.toUpperCase(); render(); const i=document.querySelector('input'); if(i){i.focus(); i.setSelectionRange(i.value.length,i.value.length);} };
        window.handleLogin = () => { if (state.loginInput.length === 3) setState({ user: { initials: state.loginInput }, view: 'dashboard' }); };
        window.logout = () => setState({ user: null, view: 'login', loginInput: '' });
        window.navigate = (view) => setState({ view });
        window.toggleTheme = () => { setState({ darkMode: !state.darkMode }); const b=document.body; if(!state.darkMode){b.classList.remove('bg-[#050505]','text-white');b.classList.add('bg-[#f0f4f8]','text-slate-900');}else{b.classList.add('bg-[#050505]','text-white');b.classList.remove('bg-[#f0f4f8]','text-slate-900');} };
        window.setSortOption = (option) => {
            const allowed = ['priority', 'destination', 'createdAt'];
            if (allowed.includes(option)) {
                setState({ sortOption: option });
            }
        };
        window.openOrder = (id) => { const o = MOCK_ORDERS.find(x=>x.id===id); setState({ activeOrder: o, view: 'picking', pickedItems: new Set(), isEditingDestination: false, scanFeedback: null }); };
        window.togglePickItem = (id) => { const s = new Set(state.pickedItems); if(s.has(id))s.delete(id);else s.add(id); setState({ pickedItems: s }); };
        window.setManualScanInput = (value) => { setState({ manualScanInput: value.toUpperCase() }); };
        window.submitManualScan = () => {
            const code = state.manualScanInput.trim();
            if (!code) return;
            processPickingScan(code);
            setState({ manualScanInput: '' });
            setTimeout(() => {
                const input = document.getElementById('manual-scan-input');
                if (input) input.focus();
            }, 0);
        };

        function processPickingScan(rawCode) {
            const normalized = rawCode.trim().toUpperCase();
            const item = MOCK_PICK_ITEMS.find((i) => i.id.toUpperCase() === normalized);
            if (item) {
                const alreadyPicked = state.pickedItems.has(item.id);
                const updatedSet = new Set(state.pickedItems);
                if (!alreadyPicked) {
                    updatedSet.add(item.id);
                }
                setState({
                    pickedItems: updatedSet,
                    scanFeedback: {
                        status: 'success',
                        message: `${item.id} ${alreadyPicked ? 'was al bevestigd' : 'toegevoegd aan selectie'}`
                    }
                });
            } else {
                setState({
                    scanFeedback: { status: 'warning', message: `${normalized || 'Onbekende code'} niet gevonden in picklijst.` }
                });
            }
        }

        // --- HANDLERS VOOR MODAL ---
        window.openConfirmationModal = () => {
            if (state.pickedItems.size > 0) {
                setState({ showConfirmationModal: true });
            }
        };

        window.closeConfirmationModal = () => {
            setState({ showConfirmationModal: false });
        };

        window.executePicking = () => {
            const itemsToKeep = MOCK_PICK_ITEMS.filter(item => !state.pickedItems.has(item.id));
            const count = state.pickedItems.size;
            const orderId = state.activeOrder?.id || '';

            const remainingItems = Math.max((state.activeOrder?.items || 0) - count, 0);
            const totalItems = state.activeOrder?.totalItems || state.activeOrder?.items || 0;
            const newStatus = remainingItems === 0 ? 'completed' : (remainingItems < totalItems ? 'partial' : 'pending');
            const updatedOrder = state.activeOrder ? { ...state.activeOrder, items: remainingItems, status: newStatus } : null;

            // Simuleer backend update door de MOCK array te vervangen
            MOCK_PICK_ITEMS = itemsToKeep;

            if (updatedOrder) {
                const orderIndex = MOCK_ORDERS.findIndex(o => o.id === updatedOrder.id);

                if (newStatus === 'completed') {
                    if (orderIndex !== -1) {
                        MOCK_ORDERS.splice(orderIndex, 1);
                    }
                    ARCHIVED_ORDERS.push(updatedOrder);
                } else if (orderIndex !== -1) {
                    MOCK_ORDERS[orderIndex] = updatedOrder;
                }
            }

            const newPicks = Math.min(60, Math.max(30, state.stats.picksPerHour + (Math.random() > 0.5 ? 1 : -1)));
            const hasRemainingPickLines = MOCK_PICK_ITEMS.length > 0;
            const nextView = newStatus === 'completed' ? 'dashboard' : (hasRemainingPickLines ? 'picking' : 'dashboard');

            setState({
                view: nextView,
                activeOrder: newStatus === 'completed' ? null : updatedOrder,
                pickedItems: new Set(),
                showConfirmationModal: false,
                scanFeedback: null,
                manualScanInput: '',
                stats: {
                    ...state.stats,
                    picksPerHour: newPicks,
                    totalPicksShift: state.stats.totalPicksShift + count
                }
            });

            if (newStatus === 'completed') {
                setTimeout(() => alert(`Order ${orderId} voltooid!`), 100);
            }
        };
        // --- EINDE MODAL HANDLERS ---

        // HANDLERS VOOR DESTINATION WIJZIGEN
        window.toggleEditDestination = () => {
            const isEditing = state.isEditingDestination;
            if (!isEditing) {
                setState({ isEditingDestination: true, newDestinationInput: state.activeOrder.destination || '' });
            } else {
                setState({ isEditingDestination: false, newDestinationInput: '' });
            }
        };

        window.setNewDestinationInput = (value) => {
            state.newDestinationInput = value.toUpperCase(); 
            render(); 
            setTimeout(() => {
                const input = document.getElementById('destination-input');
                if (input) {
                    input.focus();
                    input.value = state.newDestinationInput;
                    input.setSelectionRange(input.value.length, input.value.length);
                }
            }, 0);
        };

        window.saveDestination = () => {
            if (state.newDestinationInput.length > 0) {
                const updatedDestination = state.newDestinationInput;
                const updatedOrder = { ...state.activeOrder, destination: updatedDestination };
                
                const orderIndex = MOCK_ORDERS.findIndex(o => o.id === updatedOrder.id);
                if (orderIndex !== -1) {
                    MOCK_ORDERS[orderIndex] = updatedOrder;
                }
                
                setState({
                    activeOrder: updatedOrder,
                    isEditingDestination: false,
                    newDestinationInput: ''
                });
            }
        };
        
        window.resetLoc = () => setState({ scanStep: 1, scannedData: { ...state.scannedData, location: '' } });
        window.confirmAssetLink = () => { setState({ scanStep: 3 }); setTimeout(() => { setState({ scanStep: 0, scannedData: { truck: '', location: '' } }); }, 2500); };

        // --- REAL CAMERA LOGIC ---
        
        window.openScanner = (context = null) => {
            setState({ showScanner: true, scannerContext: context });
            setTimeout(() => {
                const html5QrCode = new Html5Qrcode("reader");
                state.html5QrCode = html5QrCode;
                const config = { fps: 10, qrbox: { width: 250, height: 250 } };
                html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess, onScanFailure)
                .catch(err => {
                    console.error("Camera start failed", err);
                    alert("Kan camera niet starten. Zorg dat je HTTPS gebruikt.");
                    closeScanner();
                });
            }, 100);
        };

        window.closeScanner = () => {
            if (state.html5QrCode) {
                state.html5QrCode.stop().then(() => {
                    state.html5QrCode.clear();
                    setState({ showScanner: false, html5QrCode: null, scannerContext: null });
                }).catch(err => {
                    console.log("Stop failed", err);
                    setState({ showScanner: false, html5QrCode: null, scannerContext: null });
                });
            } else {
                setState({ showScanner: false, scannerContext: null });
            }
        };

        function onScanSuccess(decodedText, decodedResult) {
            if (state.html5QrCode) {
                state.html5QrCode.stop().then(() => {
                    state.html5QrCode.clear();
                    handleRealScan(decodedText);
                });
            }
        }
        
        function onScanFailure(error) {}

        function handleRealScan(result) {
            setState({ showScanner: false, html5QrCode: null, scannerContext: null });

            if(state.view === 'asset-scan' && state.scannerContext !== 'picking') {
                if(state.scanStep===0) {
                    setState({ scannedData:{...state.scannedData, truck: result}, scanStep:1 });
                } else if(state.scanStep===1) {
                    setState({ scannedData:{...state.scannedData, location: result}, scanStep:2 });
                }
            } else if (state.view === 'picking' || state.scannerContext === 'picking') {
                processPickingScan(result);
            } else {
                alert(`Gescand: ${result}`);
            }
        }

        // --- SCROLL LOGIC ---
        function attachScrollListener() {
            const container = document.getElementById('scroll-container');
            const header = document.getElementById('dashboard-view'); 
            const headerInner = document.getElementById('dashboard-header');
            
            if (container && header) {
                container.addEventListener('scroll', (e) => {
                    const isScrolled = e.target.scrollTop > 20;
                    if (isScrolled) {
                        header.classList.add('is-scrolled');
                         headerInner.classList.add(state.darkMode ? 'bg-black/40' : 'bg-white/60', 'backdrop-blur-xl', 'border-white/5');
                    } else {
                        header.classList.remove('is-scrolled');
                        headerInner.classList.remove('bg-black/40', 'bg-white/60', 'backdrop-blur-xl', 'border-white/5');
                    }
                });
            }
        }

        function render() {
            const app = document.getElementById('app');
            let html = '';
            switch (state.view) {
                case 'login': html = renderLogin(); break;
                case 'dashboard': html = renderDashboard(); break;
                case 'picking': html = renderPicking(); break;
                case 'asset-scan': html = renderAssetScan(); break;
            }
            html += renderScanner();
            html += renderConfirmationModal(); // Render modal bovenop alles
            app.innerHTML = html;
            lucide.createIcons();
            attachScrollListener();
        }

        render();
    </script>
</body>
</html>
